<script>
    const lessonTitle = "Balık Hastalıkları ve Yetiştiricilik Yönetimi";

    // 80 Soru, Şıklar (o), Doğru Cevap İndeksi (c) ve Çözümler (e)
    const quizData = [
        {q: "SORU-1: Hastalıkların ortaya çıkışında \"konakçı-patojen-çevre\" üçgenindeki dengenin bozulması esastır. Bu bağlamda metne göre stres, balık hastalıklarının patogenezinde ve epidemiyolojisinde nasıl bir faktör olarak tanımlanmaktadır?", o: ["A) Etiyolojik faktör", "B) Predispoze (hazırlayıcı) faktör", "C) İnnate immunity (doğuştan gelen) faktörü", "D) Homeostazis faktörü"], c: 1, e: "B - Metinde stresin hastalıkların patogenezinde 'hazırlayıcı (predispoze) bir faktör' olarak kritik rol üstlendiği açıkça belirtilmiştir."},
        {q: "SORU-2: Aşağıdaki kavramları doğru tanımlarıyla eşleştiriniz.\nI. Homeostazis a) Canlının biyolojik sistemini harekete geçiren bir uyarımı takiben sistemin verdiği sonraki reaksiyonların tamamı.\nII. Stres Yanıtı b) Balığın doğuştan gelen direnci ve genel savunma mekanizması.\nIII. İnnate Immunity c) Çevresel, fizyolojik veya biyolojik faktörlerin baskısı altında balığın muhafaza edemediği normal fizyolojik dengesi.", o: ["A) I-c, II-a, III-b", "B) I-a, II-b, III-c", "C) I-b, II-c, III-a", "D) I-c, II-b, III-a"], c: 0, e: "A - Homeostazis (c) normal fizyolojik denge, Stres Yanıtı (a) uyarımı takiben verilen reaksiyonlar, İnnate Immunity (b) ise doğuştan gelen dirençtir."},
        {q: "SORU-3: Balıkların, karasal hayvanlara kıyasla çevresel değişimlere karşı çok daha hassas olmalarının temel fizyolojik nedeni metinde hangi kavramlarla açıklanmıştır?", o: ["A) Nöro-endokrin tepki zinciri başlatmaları", "B) Lenfopeni yaşamaları ve antikor kapasitelerinin düşmesi", "C) Poikiloterm (soğukkanlı) canlılar olmaları ve sucul ortamla sürekli ozmotik/iyonik etkileşim halinde bulunmaları", "D) Glukokortikoid hormonu olan kortisol düzeylerinin artış göstermesi"], c: 2, e: "C - Balıkların karasal hayvanlara kıyasla hassas olmalarının nedeni 'poikiloterm (soğukkanlı)' canlılar olmaları ve 'ozmotik ve iyonik etkileşim' halinde bulunmalarıdır."},
        {q: "SORU-4: Stres faktörüne maruz kalan balığın vücudunda başlayan nöro-endokrin tepki zincirinde, \"birincil stres yanıtı\" olarak salgılanan hormon grubu aşağıdakilerden hangisidir?", o: ["A) Kortikosteroidler", "B) Glukokortikoidler", "C) Kortisol", "D) Katekolaminler"], c: 3, e: "D - Metne göre nöro-endokrin tepki zincirinde birincil stres yanıtı olarak 'katekolaminler (adrenalin/noradrenalin)' salgılanır, bunu kortikosteroidler takip eder."},
        {q: "SORU-5: Stresli koşullarda kanda belirgin bir artış gösteren kortisol hormonunun, balığın metabolizması ve bağışıklık sistemi üzerindeki sentezlenmiş etkisi aşağıdakilerden hangisidir?", o: ["A) Enerji kaynaklarını \"savaş veya kaç\" tepkisi için mobilize ederken, hayati olmayan diğer sistemleri ve bağışıklığı baskılar.", "B) Balığın adaptasyon yeteneğini zorlayarak anında tükenme evresine geçmesini ve somatik büyüme oranının artmasını sağlar.", "C) İnnate immunity'yi güçlendirerek fırsatçı patojenlere karşı duyarlılık artışını tek başına engeller.", "D) Birincil stres yanıtı olarak adrenalin salgılanmasını durdurur ve lenfosit sayısında artışa neden olur."], c: 0, e: "A - Kortisol, enerji kaynaklarını savaş/kaç tepkisi için mobilize ederken, hayati olmayan diğer sistemleri (ve bağışıklığı) baskılar."},
        {q: "SORU-6: Yüksek kortisol seviyesi etkisi altında, balığın bağışıklık sisteminin normal işleyişinde ciddi bozukluklar görülür. Metne göre bu durum, antikor üretim kapasitesinin düşmesine ve lenfosit sayısında azalmaya yol açar. Lenfosit sayısındaki bu azalma durumu klinik olarak nasıl adlandırılmaktadır?", o: ["A) Homeostazis", "B) Lenfopeni", "C) Poikiloterm", "D) Etiyoloji"], c: 1, e: "B - Yüksek kortisol altında bağışıklık bozulur ve lenfosit sayısındaki azalmaya metinde 'lenfopeni' adı verilmiştir."},
        {q: "SORU-7: Stresin ileri aşamalarında, balık fizyolojisinin \"tükenme\" evresine girmesinin geri dönüşümü olmayan fizyolojik sonuçları arasında aşağıdakilerden hangisi gösterilemez?", o: ["A) Üreme oranının düşmesi", "B) Somatik büyüme oranında azalma", "C) Fırsatçı patojenlere karşı duyarlılık artışı ve ölüm", "D) Anabolik (yapım) faaliyetlerin hızlanması"], c: 3, e: "D - Tükenme evresinde üreme düşer, büyüme azalır, ölüm görülür. 'Anabolik faaliyetlerin hızlanması' yanlış çeldiricidir; metinde anabolik (yapım) faaliyetlerin 'durduğu' belirtilir."},
        {q: "SORU-8: Aşağıdaki stres türlerini ve kaynaklarını doğru tanımlarıyla eşleştiriniz.\nI. Akut Stres a) Sürekli devam eden ve balığın adaptasyon yeteneğini zorlayan uzun vadeli durum.\nII. Kronik Stres b) Aşırı stoklama yoğunluğu ve subletal düzeyde sürekli amonyak varlığı.\nIII. Kronik Stres Kaynakları c) Dakika veya saatlerle ifade edilebilen, genellikle canlının fizyolojik yanıtından daha kısa süreli olan uyarılar.", o: ["A) I-b, II-a, III-c", "B) I-c, II-a, III-b", "C) I-a, II-c, III-b", "D) I-c, II-b, III-a"], c: 1, e: "B - Akut stres (c) kısa süreli uyarılardır. Kronik stres (a) adaptasyonu zorlayan uzun vadeli durumdur. Kronik stres kaynakları (b) ise aşırı stoklama ve amonyak varlığıdır."},
        {q: "SORU-9: Aşağıdakilerden hangisi balık yetiştiriciliğinde karşılaşılan \"Akut Stres\" kaynaklarından biri değildir?", o: ["A) Kısa süreli elden geçirme işlemleri (aşılama, boylama vb.)", "B) Hastalık tedavisi uygulamaları (banyo tedavileri vb.)", "C) Su kalitesindeki ani ve aşırı dalgalanmalar (ani pH şoku vb.)", "D) Balıkların yaşam alanının daralması ve sosyal rekabet (aşırı stoklama yoğunluğu)"], c: 3, e: "D - 'Aşırı stoklama yoğunluğu' ve 'sosyal rekabet' metinde Akut Stres değil, Kronik Stres kaynakları altında listelenmiştir."},
        {q: "SORU-10: Kronik strese yol açan ve su kalitesi parametrelerinin sürekli kötü kalmasıyla karakterize edilen durum metinde hangi spesifik örnekle açıklanmıştır?", o: ["A) Subletal düzeyde sürekli amonyak varlığı", "B) Birincil stres yanıtı olarak noradrenalin varlığı", "C) Su ortamıyla sürekli ozmotik etkileşim varlığı", "D) Glukokortikoid hormonunun sürekli uyarımı"], c: 0, e: "A - Sürekli kötü su kalitesine maruz kalmanın örneği olarak metinde parantez içinde '(örneğin subletal düzeyde sürekli amonyak varlığı)' ifadesi kullanılmıştır."},
        {q: "SORU-11: Stres hormonlarının balığın morfolojisi ve davranışları üzerindeki ilk etkilerinden biri renk değişimleridir. Metne göre balıklarda gözlenen bu renk değişimlerinin (koyulaşma veya solma) fizyolojik temeli hangi hücresel yapı üzerindeki etkileşimle açıklanmaktadır?", o: ["A) Kromatoforlar", "B) Lenfositler", "C) Eritrositler", "D) Solungaç lamelleri"], c: 0, e: "A - Metinde stres hormonlarının doğrudan 'kromatoforlar' üzerindeki etkisiyle renk değişimlerinin görüldüğü açıkça ifade edilmiştir."},
        {q: "SORU-12: Stres altında kalan balıklarda beslenme ve büyüme fizyolojisi doğrudan sekteye uğrar. Metne göre balıklarda iştah azalmasına (anoreksiya) ek olarak, alınan yemin metabolik enerjiye dönüşümünün bozulması durumunun temel göstergesi aşağıdakilerden hangisidir?", o: ["A) Yem değerlendirme oranında (FCR) kötüleşme gözlenmesi", "B) Somatik büyüme oranının stabil şekilde ilerlemesi", "C) Anabolik faaliyetlerin kalıcı olarak hızlanması", "D) Doğuştan gelen direncin (innate immunity) artması"], c: 0, e: "A - Alınan yemin metabolik enerjiye dönüşümünün bozulması durumunda, 'yem değerlendirme oranında (FCR) kötüleşme' gözlendiği belirtilmiştir."},
        {q: "SORU-13: Aşağıdaki kimyasal stres kaynakları ve balık fizyolojisindeki etkilerini doğru tanımlarıyla eşleştiriniz.\nI. İyonize olmamış amonyak (NH3) a) Hücre zarlarından kolayca geçerek merkezi sinir sistemini etkiler.\nII. Nitrit (NO2-) b) Kanda hemoglobine bağlanarak oksijen taşınımını engeller.\nIII. Metabolik artık yükü c) Dışkı ve organik yükün parçalanmasıyla toksik etki yaratır.", o: ["A) I-a, II-b, III-c", "B) I-b, II-a, III-c", "C) I-c, II-b, III-a", "D) I-a, II-c, III-b"], c: 0, e: "A - Metinde NH3 merkezi sinir sistemini, NO2- oksijen taşınımını etkiler; dışkı ise parçalanarak toksik etki yaratan metabolik artıktır."},
        {q: "SORU-14: Nitritin kanda hemoglobine bağlanması sonucu oksijen taşınımının bloke edilmesi tablosu, klinik olarak aşağıdaki hastalıklardan hangisiyle adlandırılmaktadır?", o: ["A) Gaz Kabarcığı Hastalığı", "B) Methemoglobinemi (Kahverengi Kan Hastalığı)", "C) Lenfopeni", "D) Hipoksi"], c: 1, e: "B - Nitritin hemoglobine bağlanarak oksijen taşınmasını engellediği bu tablo, 'methemoglobinemi' olarak adlandırılır."},
        {q: "SORU-15: Su ürünleri yetiştiriciliğinde balık büyüklüklerinin çok farklı olması \"hiyerarşik stres\" adı verilen spesifik bir tabloya yol açar. Metne göre bu durumun canlı üzerindeki temel yansıması aşağıdakilerden hangisidir?", o: ["A) Balıkların kromatoforlarında ani renk açılmasına ve saklanma eğilimine girmelerine yol açması", "B) Büyük balıkların küçükler üzerinde baskı kurması ve yeme ulaşımın engellenmesi", "C) Su kalitesindeki iyonize olmamış amonyak miktarını doğrudan artırması", "D) Suyun ozmotik dengesini bozarak toleransın tamamen yitirilmesi"], c: 1, e: "B - Balık büyüklüklerinin farklı olması, büyüklerin küçükler üzerinde baskı kurmasına ve onların yeme ulaşımını engellemesine neden olur."},
        {q: "SORU-16: Fiziksel stres kaynakları ve bunların patolojik sonuçları arasındaki nedensel ilişkiye göre, balıklarda \"Gaz Kabarcığı Hastalığı\"nın ortaya çıkmasına neden olan asıl faktör aşağıdakilerden hangisidir?", o: ["A) Gazların (O2, N2) suda aşırı doygunluk seviyesine ulaşması", "B) Sudaki oksijenin (O2) yetersiz kalması (hipoksi durumu)", "C) Ani sıcaklık değişimlerinin tetiklediği metabolik şok", "D) Fotoperiyodun (aydınlık/karanlık süresi) aşırı düzensizliği"], c: 0, e: "A - Çözünmüş gazlarda oksijen ve azot gazlarının aşırı doygunluğu doğrudan 'Gaz kabarcığı hastalığına' yol açar."},
        {q: "SORU-17: İşletmelerde uygulanan boylama, yakalama ve ağ değiştirme gibi \"elden geçirme işlemleri\" doğrudan bir mekanik stres yaratır. Bu tür fiziksel müdahalelerin balığın \"osmoregülasyonunu bozması ve sekonder enfeksiyonlara zemin hazırlamasının\" altındaki temel fizyolojik neden nedir?", o: ["A) Balığın kanındaki kortikosteroid seviyesini anında sıfırlaması", "B) Merkezî sinir sistemini baskılayarak balığı anesteziye sokması", "C) Balığın en önemli koruyucu bariyeri olan mukus tabakasına zarar vermesi", "D) Yem değerlendirme oranını (FCR) kalıcı olarak artırması"], c: 2, e: "C - Elden geçirme işlemleri, balığın 'mukus tabakasına' hasar verir; enfeksiyonlara zemin hazırlayan kök neden mukus hasarıdır."},
        {q: "SORU-18: Aşağıdaki stres faktörlerini, ait oldukları ana stres kaynağı kategorisi ile doğru şekilde eşleştiriniz.\nI. Hipoksi (Oksijen yetersizliği) a) Yetiştiricilik İşlemlerine Bağlı Stres\nII. Hatalı dozajda veya sürede tedavi b) Fiziksel Stres\nIII. Endüstriyel veya tarımsal kirlilik c) Kimyasal Stres", o: ["A) I-b, II-a, III-c", "B) I-a, II-b, III-c", "C) I-c, II-a, III-b", "D) I-b, II-c, III-a"], c: 0, e: "A - Hipoksi Fiziksel, Hatalı tedavi Yetiştiricilik işlemi, Kirlilik ise Kimyasal stres kaynağıdır."},
        {q: "SORU-19: Metne göre \"nakil (taşıma)\" işlemi, tek bir stres faktörü olmaktan ziyade kompleks bir süreci ifade eder. Aşağıdakilerden hangisi balık nakli sırasında bir araya gelen bu kompleks stres unsurlarından biri olarak değerlendirilmez?", o: ["A) Sarsıntı", "B) Sıkışıklık", "C) Hiyerarşik stres", "D) Su kalitesi değişimleri"], c: 2, e: "C - Metinde nakil kompleksinin unsurları sarsıntı, sıkışıklık ve su kalitesi değişimidir. Hiyerarşik stres Biyolojik kaynaktır."},
        {q: "SORU-20: Yetiştiricilik sistemlerinde stresin \"yönetilebilir\" düzeyde tutulması işletmeye çeşitli avantajlar sağlar. Aşağıdakilerden hangisi bu avantajlardan biri değildir?", o: ["A) Balıkların büyüme performansının artması", "B) Fırsatçı patojenlerin su ortamından tamamen izole edilerek yok edilmesi", "C) Kullanılan yem maliyetlerinin işletme lehine düşmesi", "D) Hastalık kaynaklı oluşabilecek ölümlerin engellenmesi"], c: 1, e: "B - Stresin yönetilmesi büyümeyi artırır, maliyeti düşürür. Patojenlerin ortamdan tamamen izole edilmesi (sıfırlanması) uydurulmuş bir çeldiricidir."},
        {q: "SORU-21: Yetiştiricilik sistemlerinde hastalık etmenlerinin konakçıya ulaşmasını kolaylaştıran bir \"vektör\" görevi gören asıl fiziksel/biyolojik durum aşağıdakilerden hangisidir?", o: ["A) Doğal ortamda geniş su kütlelerinde düşük yoğunlukta yaşanması", "B) Yüksek debili ve taze su girişinin sistemde devamlılık sağlaması", "C) Kültür ortamında sınırlı hacimde yüksek biyokütle (stoklama) ile bulunulması", "D) Solunumdan boşaltıma tüm fonksiyonların sıvı ortam dışında gerçekleştirilmesi"], c: 2, e: "C - Sınırlı hacimde yüksek biyokütle ile bulunulmasının hastalık etmenlerinin konakçıya ulaşmasında vektör görevi gördüğü ifade edilmiştir."},
        {q: "SORU-22: Patoloji kuralı bağlamında, enfeksiyon tablosunun başlamasına yol açan asıl neden-sonuç mekanizması aşağıdakilerden hangisidir?", o: ["A) Sadece patojenin ortamda kendi kendine çoğalmaya başlaması", "B) Çevresel stres faktörlerinin balığın bağışıklık sistemini baskılamasıyla çevresel koşulların bozulması", "C) Biyolojik oksijen ihtiyacının (BOİ) balıklar lehine artması", "D) Patojenlerin, yüksek çözünmüş oksijen seviyelerine aşırı maruz kalması"], c: 1, e: "B - Enfeksiyonu başlatan unsur sadece patojenin varlığı değil; çevresel stres faktörlerinin balığın bağışıklık sistemini baskılamasıdır."},
        {q: "SORU-23: Yoğun (intensif) balık yetiştiriciliğinde, \"bol su\" kullanımının ortamdaki metabolik atıkları uzaklaştırarak uygun su koşullarını devam ettirmesi mekanizması metinde hangi kavramla ifade edilmiştir?", o: ["A) Taşıma kapasitesi", "B) Bohr etkisi", "C) Ötrofikasyon etkisi", "D) Dilüsyon (seyreltme) etkisi"], c: 3, e: "D - Yüksek debili taze su girişinin atıkları seyrelterek uzaklaştırmasına '(dilüsyon etkisi)' denilmiştir."},
        {q: "SORU-24: Aşağıdaki su kalitesini belirleyen üç ana faktörü, doğru tanımlarıyla eşleştiriniz.\nI. Kullanılan Suyun Özelliği II. Sistemin Yapısı III. Yönetim\na) Havuz tipi (beton, toprak) ve mühendislik detayları. b) Kaynak suyunun başlangıçtaki fiziko-kimyasal yapısı. c) Yemleme rejimi, stok kontrolü ve hijyen.", o: ["A) I-b, II-a, III-c", "B) I-a, II-b, III-c", "C) I-c, II-b, III-a", "D) I-b, II-c, III-a"], c: 0, e: "A - Kullanılan Su (b), Sistemin Yapısı (a), Yönetim ise yemleme ve hijyen uygulamalarıdır (c)."},
        {q: "SORU-25: Amonyak suda farklı formlarda bulunur. Özellikle hücre zarlarından kolayca geçebildiği için balıklar için \"son derece toksik\" olan amonyak formu aşağıdakilerden hangisidir?", o: ["A) Nitrat (NO3-)", "B) İyonize (NH4+) form", "C) İyonize olmamış (NH3) form", "D) Nitrit (NO2-)"], c: 2, e: "C - Metne göre özellikle 'iyonize olmamış (NH3) formu', hücre zarlarından geçebildiği için son derece toksiktir."},
        {q: "SORU-26: Biyolojik Oksijen İhtiyacı (BOİ) seviyesinin yüksek olmasının, kültür ortamındaki balık fizyolojisini dolaylı yoldan tehdit etmesinin temel nedeni nedir?", o: ["A) Amonyağın nitrifikasyon bakterileri tarafından oksitlenerek tamamen yok olmasını sağlaması", "B) Sudaki organik maddelerin parçalanması sırasında oksijenin balıklar yerine bakteriler tarafından tüketilmesine neden olması", "C) Suyun pH'ını düşürerek ortamı daha bazik hale getirmesi", "D) Askıdaki katı maddelerin solungaç lamellerini doğrudan onarması"], c: 1, e: "B - Yüksek BOİ'nin doğrudan sonucu, sudaki çözünmüş oksijenin balıklar yerine mikroorganizmalar/bakteriler tarafından tüketilmesidir."},
        {q: "SORU-27: Yüksek karbondioksit (CO2) seviyeleri (hiperkapni), suyun pH'ını düşürerek asidik hale getirir. Kan pH'ını etkileyerek \"oksijenin hemoglobine bağlanmasını zorlaştırması\" olayı metinde hangi terimle açıklanmıştır?", o: ["A) Methemoglobinemi", "B) Bohr etkisi", "C) Hiperplazi", "D) Ötrofikasyon"], c: 1, e: "B - Yüksek CO2'nin kan pH'ını etkileyerek oksijenin hemoglobine bağlanmasını zorlaştırması olayına '(Bohr etkisi)' adı verilmiştir."},
        {q: "SORU-28: Su kalitesi parametrelerinden Fosfor'un (P) doğrudan toksik olmamakla birlikte dolaylı yoldan su kalitesini ciddi şekilde bozmasının nedeni aşağıdakilerden hangisidir?", o: ["A) Alıcı ortamlarda alg patlamasına (ötrofikasyon) neden olması", "B) Solungaç lamellerini tıkayarak mekanik hasar vermesi", "C) Hemoglobine bağlanarak kanın oksijen taşıma kapasitesini bloke etmesi", "D) Patojen bakteriler için uygun bir mekanik tutunma yüzeyi oluşturması"], c: 0, e: "A - Fosfor toksik olmamasına rağmen 'alıcı ortamlarda ötrofikasyona (alg patlaması)' neden olarak dolaylı yoldan su kalitesini bozar."},
        {q: "SORU-29: Aşağıdaki kritik su kalitesi parametrelerini, balık fizyolojisindeki patolojik etkileriyle eşleştiriniz.\nI. Nitrit (NO2-) II. Çözünmüş Oksijen (O2) III. Askıdaki Katı Madde (AKM)\na) Eksikliği boğulmaya neden olur. b) Hemoglobine bağlanarak kahverengi kan hastalığı yapar. c) Solungaç lamellerini tıkayarak mekanik hasar verir.", o: ["A) I-c, II-b, III-a", "B) I-a, II-c, III-b", "C) I-b, II-a, III-c", "D) I-b, II-c, III-a"], c: 2, e: "C - Nitrit (b) Kahverengi kan hastalığı yapar, Oksijen eksikliği (a) boğulmaya neden olur, AKM (c) solungaçları tıkar."},
        {q: "SORU-30: \"Doğru Stoklama Yoğunluğu\" belirlenirken, işletmenin hangi spesifik kapasite sınırını aşmaması gerektiği vurgulanmıştır?", o: ["A) Alkalinite sınırı", "B) Taşıma kapasitesi (carrying capacity)", "C) Dilüsyon etkisi", "D) Biyolojik oksijen ihtiyacı (BOİ)"], c: 1, e: "B - Doğru stoklama yoğunluğu tanımlanırken 'sistemin taşıma kapasitesini (carrying capacity) aşmayan' ifadesi kullanılmıştır."},
        {q: "SORU-31: Gaz Kabarcığı Hastalığı'nın patofizyolojisi, çözünmüş gazların sıvı fazdan gaz fazına geçme eğilimini açıklayan hangi fiziksel prensibe dayanır?", o: ["A) Henry Yasası", "B) Bohr Etkisi", "C) Dilüsyon Etkisi", "D) Methemoglobinemi Yasası"], c: 0, e: "A - Metinde hastalığın patofizyolojisinin 'Henry Yasası' prensiplerine dayandığı ve emboli oluşumunu açıkladığı belirtilmiştir."},
        {q: "SORU-32: Aşağıdaki azotlu bileşikleri ve su ürünleri sistemlerindeki özelliklerini eşleştiriniz.\nI. Amonyak (NH3) II. Nitrit (NO2-) III. Nitrat (NO3-)\na) Nitrosomonas bakterilerince oksitlenerek oluşan ve klorürü taklit eden bileşik. b) Balığın %90 oranında doğrudan suya bıraktığı temel atık. c) En az toksik form.", o: ["A) I-b, II-a, III-c", "B) I-a, II-b, III-c", "C) I-c, II-a, III-b", "D) I-b, II-c, III-a"], c: 0, e: "A - Amonyak (b) temel artıktır, Nitrit (a) Nitrosomonas oksidasyonuyla oluşur, Nitrat (c) ise en az toksik formdur."},
        {q: "SORU-33: Amonyağın hücre zarlarından kolayca geçen çok daha \"toksik forma\" (NH3) kaymasını tetikleyen temel çevresel değişiklik aşağıdakilerden hangisidir?", o: ["A) Su ortamındaki klorür iyonlarının artması", "B) Su ortamında pH değerinin ve sıcaklığın artması", "C) Sudaki çözünmüş oksijen miktarının aşırı doygunluğa ulaşması", "D) Havuz tabanında tüketilmeyen yemin mikrobiyal bozunmasının durması"], c: 1, e: "B - Metinde, 'su ortamında pH ve sıcaklık arttığında, kimyasal dengenin toksik forma (NH3) kaydığı' net bir şekilde ifade edilmiştir."},
        {q: "SORU-34: Balıkların, tükettikleri azotlu atıklarını \"üreye çevirmek yerine\" ağırlıklı olarak doğrudan amonyak şeklinde suya bırakmalarının temel fizyolojik nedeni nedir?", o: ["A) Amonyağın doğrudan merkezî sinir sistemini uyarması", "B) Solungaç lamellerini tıkayarak mekanik hasarı önlemesi", "C) Enerji tasarrufu sağlamak amacı taşıması", "D) Suda klorür (Cl-) iyonlarının yetersiz bulunması"], c: 2, e: "C - Metinde, balıkların azotlu atıklarını üreye çevirmek yerine 'enerji tasarrufu sağlamak amacıyla' doğrudan amonyak olarak attığı yazmaktadır."},
        {q: "SORU-35: Tatlı su balıklarında nitrit, hangi spesifik iyonu \"taklit ederek\" aktif taşıma yoluyla solungaçlardan kana geçmektedir?", o: ["A) Kalsiyum (Ca+2)", "B) Klorür (Cl-)", "C) Karbonat (CO3-2)", "D) Amonyum (NH4+)"], c: 1, e: "B - Metinde, 'tatlı su balıklarında nitrit, sudaki klorür (Cl-) iyonlarını taklit ederek aktif taşıma yoluyla vücuda girer' denilmektedir."},
        {q: "SORU-36: Nitrit zehirlenmesinde (Methemoglobinemi), ortamdaki suyun oksijen düzeyi yüksek olsa bile balıkta \"içsel bir boğulma\" meydana gelir. Bu durumun altında yatan patolojik neden nedir?", o: ["A) Sudaki aşırı oksijenin Henry Yasası gereği emboli oluşturması", "B) Amonyağın solungaç epitelini zayıflatarak oksijen girişini kapatması", "C) Nitritin hemoglobin molekülündeki demiri yükseltgeyerek kanın oksijen bağlama kapasitesini yok etmesi", "D) Nitritin klorür iyonlarını taklit ederek böbrek fonksiyonlarını durdurması"], c: 2, e: "C - Metin, nitritin hemoglobindeki demiri yükseltgediğini, kanın oksijen bağlayamadığı için su oksijen dolu olsa bile içsel boğulma yaşandığını açıklar."},
        {q: "SORU-37: Aşağıdaki klinik bulguları metinde bahsedilen toksisite durumlarıyla eşleştiriniz.\nI. Göz fırlaması (ekzoftalmus) II. Çikolata kahverengisi kan III. Nörolojik bozukluklar\na) Akut Amonyak Zehirlenmesi b) Gaz Kabarcığı Hastalığı c) Methemoglobinemi", o: ["A) I-b, II-c, III-a", "B) I-a, II-b, III-c", "C) I-b, II-a, III-c", "D) I-c, II-b, III-a"], c: 0, e: "A - Göz fırlaması Gaz Kabarcığı hastalığında (b), kahverengi kan Methemoglobinemide (c), nörolojik bozukluklar Akut Amonyak zehirlenmesinde (a) görülür."},
        {q: "SORU-38: Kronik amonyak zehirlenmesinin \"Bakteriyel Solungaç Hastalığı\" için bir hazırlayıcı faktör olmasının temel mekanizması nedir?", o: ["A) Kan plazmasındaki demir iyonlarını tamamen bağlaması", "B) Gazların sıvı fazdan gaz fazına geçme eğilimini durdurması", "C) Solungaç epitelini zayıflatarak hücresel hasar (hiperplazi/nekroz) yaratması", "D) Amonyağın doğrudan klorür aktif taşıma pompalarını kapatması"], c: 2, e: "C - Subletal amonyağın solungaç epitelini zayıflatarak hücresel hasar oluşturduğu ve enfeksiyonlara hazırlayıcı faktör görevi gördüğü sentezlenmiştir."},
        {q: "SORU-39: Gaz Kabarcığı Hastalığı'nda oluşan gaz embolileri ölümcüldür. Patolojik tablo bağlamında, bu hastalığın balığı öldüren nihai mekanizması aşağıdakilerden hangisidir?", o: ["A) Kılcal damarlarda kan akışının gaz kabarcıkları tarafından mekanik olarak bloke edilmesi (iskemi)", "B) Merkezî sinir sistemine yüksek dozda uyarım göndererek balığı nörolojik şoka sokması", "C) Hemoglobinin oksijen taşıma kapasitesini biyokimyasal reaksiyonla sıfırlaması", "D) Osmoregülasyon sisteminin çökerterek balığın aşırı su almasına neden olması"], c: 0, e: "A - Gaz kabarcıklarının hayati organlarda kılcal damarları tıkayarak kan akışını bloke etmesi (iskemi) ölümcül tablonun asıl nedenidir."},
        {q: "SORU-40: Azot döngüsünde nitrifikasyonun ilk basamağını gerçekleştiren ve \"amonyağı oksitleyerek nitrite dönüştüren\" bakteri türü hangisidir?", o: ["A) Flavobacterium sp.", "B) Nitrosomonas sp.", "C) Methemoglobin sp.", "D) İyonize amonyum"], c: 1, e: "B - Metinde, amonyağı oksitleyerek nitrit oluşumunu sağlayan bakterilerin 'Nitrosomonas türü' olduğu açıkça belirtilmiştir."},
        {q: "SORU-41: Nitrat birikiminin engellenemeyip kronikleşerek temel bir problem haline geldiği işletme modeli aşağıdakilerden hangisidir?", o: ["A) Sınırlı Su Değişimli Sistemler (RAS - Resirküle Sistemler)", "B) Sürekli su değişiminin olduğu akıntılı sistemler", "C) Patojen olmayan mikroorganizmaların yoğun olduğu dış havuzlar", "D) Yüksek debili ve taze su girişinin maksimum olduğu işletmeler"], c: 0, e: "A - Metne göre Sınırlı Su Değişimli Sistemlerde (RAS) nitrat birikimi engellenemediği için kronik seviyelere ulaşır."},
        {q: "SORU-42: Nitrat miktarına \"en çok dikkat edilmesi gereken ve seviyesinin düşük tutulmasının elzem olduğu\" üretim aşaması/birimi neresidir?", o: ["A) Yetişkin balıkların bulunduğu porsiyonluk havuzlar", "B) Gelişim aşamasındaki embriyo ve larvaların bulunduğu kuluçkahaneler", "C) Balıkların sürekli boylama işlemlerine tabi tutulduğu üniteler", "D) Oksijen miktarının aşırı doygunluğa ulaştığı taşıma tankları"], c: 1, e: "B - Yetişkinler tolere etse de, embriyoların hassasiyeti nedeniyle 'kuluçkahanelerde' nitrata dikkat edilmelidir."},
        {q: "SORU-43: \"Yoğun su ürünleri yetiştiricilik sistemlerinde\" sistemin temel karbondioksit (CO2) kaynağı aşağıdakilerden hangisidir?", o: ["A) İyonize olmamış toksik amonyağın atılamaması", "B) Suyun alkalinitesinin sıfırlanması", "C) Sudaki fitoplanktonların gündüz fotosentez reaksiyonları", "D) Birim hacimdeki biyokütlenin (balıkların) metabolik solunum faaliyetleri"], c: 3, e: "D - Yoğun sistemlerde biyokütle arttıkça CO2 seviyesini belirleyen temel kaynak balık metabolizmasıdır."},
        {q: "SORU-44: Kandaki CO2 miktarının yükselmesiyle karakterize edilen bu tabloya ne ad verilmektedir?", o: ["A) Methemoglobinemi", "B) Hiperkapni", "C) Nefrokalsinozis", "D) Lenfopeni"], c: 1, e: "B - Difüzyon kuralları gereği kandaki karbondioksit miktarının yükseldiği bu tabloya 'Hiperkapni' adı verilir."},
        {q: "SORU-45: Kanın asitleşmesinin hemoglobinin oksijene olan ilgisini azaltarak doku hipoksisine yol açması durumu, metinde hangi kavramla tanımlanmaktadır?", o: ["A) Henry Yasası", "B) Bohr ve Root Etkisi", "C) Taşıma Kapasitesi", "D) İçsel oto-intoksikasyon"], c: 1, e: "B - Kanın asitleşmesinin hemoglobinin oksijene ilgisini azaltması mekanizması, 'Bohr ve Root Etkisi' olarak açıklanmıştır."},
        {q: "SORU-46: Suda bulunan aşırı miktardaki karbondioksitin balık fizyolojisi üzerinde yarattığı dolaylı sonuçlardan \"Nefrokalsinozis\"in fizyolojik karşılığı nedir?", o: ["A) Solungaç lamellerinde hücre ölümü", "B) Kandaki demirin (+2)'den (+3)'e yükseltgenmesi", "C) Metabolik dengenin bozularak böbreklerde kalsiyum birikmesi (böbrek taşı)", "D) Göz arkasında gaz birikimi (ekzoftalmus)"], c: 2, e: "C - Metinde karbondioksitin böbreklerde kalsiyum birikimini tetikleyerek 'böbrek taşı' oluşturmasına Nefrokalsinozis dendiği belirtilir."},
        {q: "SORU-47: Aşağıdaki kavramları eşleştiriniz.\nI. Hiperkapni a) Kanın pH değerinin düşerek asidik hale gelmesi.\nII. Respiratorik Asidoz b) Suyun pH değişimlerine karşı tampon olma kapasitesi.\nIII. Alkalinite c) Kandaki karbondioksit miktarının aşırı yükselmesi.", o: ["A) I-c, II-a, III-b", "B) I-a, II-b, III-c", "C) I-b, II-c, III-a", "D) I-c, II-b, III-a"], c: 0, e: "A - Hiperkapni kandaki CO2 artışı, Respiratorik asidoz kanın asitleşmesi, Alkalinite tamponlama kapasitesidir."},
        {q: "SORU-48: Sisteme gelen suyun, pH düşüşüne karşı \"tampon olma kapasitesinin bulunmaması ve pH'ın çok hızlı azalması\" durumunun kimyasal nedeni nedir?", o: ["A) Suyun sertliğinin ve alkalinitesinin yüksek olması", "B) Suyun yumuşak ve hafif alkali (düşük alkalinite) bir yapıya sahip olması", "C) Çözünmüş oksijen miktarının hipoksi seviyelerine inmesi", "D) Amonyağın ortamda iyonize formda bulunması"], c: 1, e: "B - Suyun yumuşak ve hafif alkali (düşük alkalinite) olması, pH değişimine karşı tampon olma kapasitesini yok eder."},
        {q: "SORU-49: Balığın kendi metabolik artığıyla zehirlenmesi olan \"içsel oto-intoksikasyon\" riskinin artmasına yol açan temel fizyolojik mekanizma nedir?", o: ["A) Düşük pH'lı (asidik) ortamın, balığın solungaçlarından amonyak atılımını zorlaştırması", "B) Suyun aşırı doygunluğunun gaz embolisi yaratması", "C) Nitritin klorür iyonlarını taklit ederek kana girmesi", "D) Hemoglobinin oksijene olan ilgisinin artarak zehirlenmeye neden olması"], c: 0, e: "A - Asidik ortamda amonyak atımı zorlaşır, içerde kalan amonyak 'içsel oto-intoksikasyona' neden olur."},
        {q: "SORU-50: Asidik sulara maruz kalan balıkların solungaçlarında meydana gelen hasarın doğrudan bir sonucu olarak balıkta şekillenen ölümcül fizyolojik problem nedir?", o: ["A) Vücut tuzlarının (iyonların) kaybına bağlı \"ozmotik dengesizlik\"", "B) Kanın oksijen taşıma kapasitesinin sıfırlanmasına bağlı \"Kahverengi Kan Hastalığı\"", "C) İştah azalmasına bağlı \"somatik büyüme oranının tamamen durması\"", "D) Stres hormonlarının işlevini yitirmesine bağlı \"kalıcı renk solması\""], c: 0, e: "A - Asidik suda hasar gören solungaçlara bağlı olarak vücut tuzlarının kaybı ve 'ozmotik dengesizlik' meydana gelir."},
        {q: "SORU-51: Deri ve mukus tabakasının oluşturduğu, patojeni tanımaksızın genel bir fiziksel/kimyasal bariyer sağlayan savunma mekanizması aşağıdakilerden hangisidir?", o: ["A) Non-spesifik (doğal) savunma mekanizması", "B) Spesifik (kazanılmış) savunma mekanizması", "C) Obligat patojen bariyeri", "D) Endoparaziter savunma"], c: 0, e: "A - Deri ve mukus tabakası, patojeni tanımaksızın genel bariyer sağlayan 'non-spesifik' savunma olarak tanımlanmıştır."},
        {q: "SORU-52: Patojen sınıflandırmasını eşleştiriniz.\nI. Obligat Patojen a) Normal koşullarda serbest yaşayan ancak stresli balıkta hastalık yapan etmen.\nII. Fakültatif Patojen b) Çoğalabilmek için kesinlikle canlı konakçıya ihtiyaç duyan etmen.", o: ["A) I-b, II-a", "B) I-a, II-b", "C) I-a, I-b", "D) II-b, II-a"], c: 0, e: "A - Obligat patojen (b) konakçıya zorunlu ihtiyaç duyar. Fakültatif (a) fırsat bulduğunda hastalık yapar."},
        {q: "SORU-53: Fakültatif (fırsatçı) patojenlerin aniden şiddetli bir salgına neden olmasının temel sebebi aşağıdakilerden hangisidir?", o: ["A) Patojenin zorunlu forma dönüşerek mutasyon geçirmesi", "B) Çevresel parametrelerin balığın mukus ve lenfosit savunmasını (bağışıklığını) baskılaması", "C) Dactylogyrus türü parazitlerin suyu tamamen asidik hale getirmesi", "D) Patojenin sadece endoparazit formunda yaşamını sürdürebilmesi"], c: 1, e: "B - Çevresel stresörlerin balığın savunma sistemini baskılaması patojene fırsat yaratır."},
        {q: "SORU-54: Hücresel yapılarına göre parazitler Protozoon ve Metazoon olarak sınıflandırılırlar. Metne göre \"Metazoon\" parazitlerin yapısal özelliği aşağıdakilerden hangisidir?", o: ["A) Tek bir hücreden oluşmaları ve sadece iç organlara yerleşmeleri", "B) Çok hücreli olmaları ve karmaşık yapılara sahip olmaları", "C) Yalnızca fakültatif patojen karakteristiği göstermeleri", "D) Serbest yüzen \"tomit\" evresinde çoğalmaları"], c: 1, e: "B - Metazoonlar, 'çok hücreli' ve karmaşık yapıya sahip parazitlerdir."},
        {q: "SORU-55: Balıklarda \"Beyaz Benek Hastalığı\"na neden olan protozoon (tek hücreli) yıkıcı ektoparazit aşağıdakilerden hangisidir?", o: ["A) Dactylogyrus", "B) Gyrodactylus", "C) Ichthyophthirius multifiliis", "D) Fakültatif lenfosit"], c: 2, e: "C - Beyaz Benek Hastalığına neden olan tek hücreli protozoon Ichthyophthirius multifiliis'tir."},
        {q: "SORU-56: Beyaz Benek parazitinin yaşam döngüsünde kimyasal tedavilerin \"sadece belirli bir evrede\" işe yaramasının nedeni nedir?", o: ["A) Parazitin suya düştüğü serbest \"tomit\" evresinde ilaçlara karşı savunmasız kalması", "B) Kimyasalların sadece yumurta kabuğunu eritebilmesi", "C) Antikorların paraziti tamamen yok edebilmesi", "D) Parazitin sadece endoparazit olarak yaşamına devam etmesi"], c: 0, e: "A - Çoğalmak için suya düştüğü 'serbest yüzen tomit evresi' kimyasal müdahalenin işe yaradığı tek zayıf noktadır."},
        {q: "SORU-57: Monogenean trematod türlerini eşleştiriniz.\nI. Dactylogyrus a) Deriye yerleşen ve canlı doğuran ektoparazit.\nII. Gyrodactylus b) Solungaçlara yerleşen ve yumurtlayarak çoğalan ektoparazit.", o: ["A) I-b, II-a", "B) I-a, II-b", "C) I-a, I-b", "D) II-b, II-a"], c: 0, e: "A - Dactylogyrus (b) solungaçlara yerleşip yumurtlar. Gyrodactylus (a) deriye yerleşip canlı doğurur."},
        {q: "SORU-58: Metne göre \"solungaçlara\" yerleşerek solunum epitelinde hasar yaratan ve solunum sıkıntısına neden olan spesifik parazit türü hangisidir?", o: ["A) Tomit", "B) Gyrodactylus", "C) Trofozoit", "D) Dactylogyrus"], c: 3, e: "D - Metinde Dactylogyrus'un hedef organının 'solungaçlar' olduğu belirtilmiştir."},
        {q: "SORU-59: Gyrodactylus parazitinin konakçı popülasyonunda \"çok hızlı ve patlayıcı bir şekilde\" artmasının temel biyolojik mekanizması nedir?", o: ["A) Yumurtalarının kış uykusuna yatabilmesi", "B) Canlı doğurarak (vivipar) çoğalması sayesinde bekleme süresi olmadan hızla tamamlanması", "C) Sadece ideal sıcaklık dışındaki balıklara saldırması", "D) Endoparazit olarak kana karışması"], c: 1, e: "B - Canlı doğuran (vivipar) yapısı, yumurta bekleme evresini atladığı için popülasyon içinde çok daha hızlı artışa neden olur."},
        {q: "SORU-60: Ektoparaziter istilalarda asıl yüksek ölümlerin görülmesinin nedeni (sentez) aşağıdakilerden hangisidir?", o: ["A) Parazitlerin balığın antikorlarını kopyalaması", "B) Parazitin açtığı yaraların fırsatçı bakteriler için giriş kapısı oluşturarak \"sekonder enfeksiyonlara\" zemin hazırlaması", "C) Mukus üretimini tamamen durdurması", "D) Balığın aşırı stres hormonu salgılaması"], c: 1, e: "B - Ektoparazitlerin asıl ölümcül etkisi, diğer fırsatçı bakterilerin içeri girmesine ve 'sekonder (ikincil) enfeksiyonlara' yol açmasıdır."},
        {q: "SORU-61: Patojenin kan dolaşımına karışarak tüm iç organlarda (karaciğer, böbrek, dalak) kanamalara neden olduğu sistemik zehirlenme tablosuna ne ad verilir?", o: ["A) Hemorajik Septisemi", "B) Nefrokalsinozis", "C) Methemoglobinemi", "D) Respiratorik Asidoz"], c: 0, e: "A - Bakterilerin kan dolaşımına geçip iç organlarda kanamalı yıkım yarattığı tabloya 'Hemorajik Septisemi' denilmiştir."},
        {q: "SORU-62: Bakteriyel patojenleri eşleştiriniz.\nI. Aeromonas salmonicida a) Saddleback (Eyer) lezyonu.\nII. Yersinia ruckeri b) Furunculosis (Çıban) hastalığı.\nIII. Flavobacterium columnare c) Kızıl Ağız (ERM) hastalığı.", o: ["A) I-b, II-c, III-a", "B) I-a, II-b, III-c", "C) I-c, II-b, III-a", "D) I-b, II-a, III-c"], c: 0, e: "A - Aeromonas (b) Furunculosis, Yersinia (c) Kızıl Ağız (ERM), Flavobacterium (a) Saddleback lezyonu yapar."},
        {q: "SORU-63: Tatlı su balıklarında özellikle sırt yüzgeci etrafında karakteristik \"eyer şeklinde (saddleback)\" lezyonlar oluşturan patojen hangisidir?", o: ["A) Vibrio anguillarum", "B) Gyrodactylus", "C) Streptococcus iniae", "D) Flavobacterium columnare"], c: 3, e: "D - Sırt yüzgecinde karakteristik beyaz-sarımtırak eyer lezyonu oluşturan patojen Flavobacterium columnare'dir."},
        {q: "SORU-64: \"Tuzlu su (deniz) yetiştiriciliğinde\" en yaygın görülen ve en yıkıcı hemorajik septisemi etkeni olan bakteri aşağıdakilerden hangisidir?", o: ["A) Yersinia ruckeri", "B) Vibrio anguillarum", "C) Ichthyophthirius multifiliis", "D) Aeromonas salmonicida"], c: 1, e: "B - Tuzlu su (deniz) sistemlerindeki en yaygın ve yıkıcı Gram-negatif bakteri Vibrio anguillarum'dur."},
        {q: "SORU-65: Streptococcus iniae enfeksiyonunun diğerlerinden farklı olarak balıktaki temel etki mekanizması aşağıdakilerden hangisidir?", o: ["A) Klorür iyonlarını taklit ederek kahverengi kan oluşturması", "B) Dokularda gaz kabarcığı yaratarak iskemik şoka neden olması", "C) Doğrudan merkezi sinir sistemine yerleşerek menenjit, dönme hareketi ve nörolojik bozukluklar yapması", "D) Solungaçlara yerleşerek oksijen alımını mekanik olarak durdurması"], c: 2, e: "C - Gram-pozitif Streptococcus iniae, sinir sistemini hedef alarak menenjit ve nörolojik bozukluklar yapar."},
        {q: "SORU-66: Osmoregülatör organların iflas etmesi sonucu balığın karın boşluğunda aşırı miktarda sıvı birikmesi tablosu klinik olarak nasıl adlandırılır?", o: ["A) Asit", "B) Ekzoftalmus", "C) Hiperkapni", "D) Lenfopeni"], c: 0, e: "A - İç organların iflasıyla karın boşluğunda sıvı birikmesi tablosuna klinik olarak 'Asit' adı verilmektedir."},
        {q: "SORU-67: Bir Gyrodactylus salgınının hemen ardından şiddetli bir Aeromonas enfeksiyonunun patlak vermesinin temel nedeni nedir?", o: ["A) Parazitlerin açtığı yaraların serbest yaşayan fırsatçı bakteriler için \"giriş kapısı\" oluşturması", "B) Aeromonas bakterisinin zorunlu olarak Dactylogyrus yumurtalarına ihtiyaç duyması", "C) Parazitlerin pH'ı asidik hale getirmesi ve amonyak zehirlenmesi başlatması", "D) Ektoparazitlerin balığın antikor üretimini artırması"], c: 0, e: "A - Parazitlerin açtığı fiziksel yaralar, sudaki fırsatçı bakterilerin kana karışmasına giriş kapısı sağlar."},
        {q: "SORU-68: Yersinia ruckeri'nin neden olduğu hastalığa \"Enteric Redmouth (ERM)\" isminin verilmesinin patognomonik nedeni nedir?", o: ["A) Ekzoftalmus (göz fırlaması) yapması", "B) Dışarıdan görünen kırmızı çıbanlar açması", "C) Hastalığın en belirgin işaretinin ağız, çene çevresindeki şiddetli hemorajik kanamalar (kızıl ağız) olması", "D) Mukus tabakasını kırmızıya boyaması"], c: 2, e: "C - ERM hastalığı adını, tipik bir bulgu olan 'ağız ve çene çevresindeki kanamalardan (kızıl ağız)' alır."},
        {q: "SORU-69: Aşağıdaki klinik bulguları doğru tanımlarıyla eşleştiriniz.\nI. Furunculosis a) Gözün dışarı fırlaması.\nII. Ekzoftalmus b) İç organlarda genel kanamalı yıkım tablosu.\nIII. Hemorajik Septisemi c) Kas dokusunda erime ve çıbanlar.", o: ["A) I-c, II-a, III-b", "B) I-a, II-b, III-c", "C) I-b, II-c, III-a", "D) I-c, II-b, III-a"], c: 0, e: "A - Furunculosis (c) çıbandır. Ekzoftalmus (a) gözün fırlamasıdır. Hemorajik septisemi (b) kanamalı yıkımdır."},
        {q: "SORU-70: Bilinçsiz antibiyotik kullanımı, işletmelerin hastalık yönetimini tamamen çökertmektedir. Bu durumun en temel farmakolojik sonucu nedir?", o: ["A) Suyun BOİ'sinin anında sıfırlanması", "B) Bakterilerin genetik mutasyonla \"dirençli suşlar\" geliştirmesi ve tedavilerin etkisiz kalması", "C) Amonyağın tamamen oksitlenmesi", "D) Savunma mekanizmasının kalıcı olarak güçlenmesi"], c: 1, e: "B - Bilinçsiz kullanım, bakterilerin 'dirençli suşlar' geliştirmesine yol açar ve tedavileri etkisiz kılar."},
        {q: "SORU-71: Virüslerin hücresel bir yapıya sahip olmadıkları ve çoğalabilmek için balığın kendi hücre mekanizmasını ele geçirdikleri yaşam formunu tanımlayan kavram nedir?", o: ["A) Fakültatif (fırsatçı) patojen", "B) Obligat hücre içi patojen", "C) Monogenean trematod", "D) Serbest yüzen tomit"], c: 1, e: "B - Virüslerin çoğalamayıp hücre mekanizmasını ele geçirmeleri durumu 'obligat hücre içi patojen' olarak tanımlanır."},
        {q: "SORU-72: Yavru balıklarda pankreası yıkan ve \"kendi etraflarında helezonik/spiral çizerek yüzmelerine\" neden olan viral etken aşağıdakilerden hangisidir?", o: ["A) Saprolegnia spp.", "B) İnfeksiyöz Pankreatik Nekroz (IPN)", "C) Viral Hemorajik Septisemi (VHS)", "D) Streptococcus iniae"], c: 1, e: "B - Yavru balıklarda görülen ve 'spiral yüzme' tablosuna neden olan viral etken İnfeksiyöz Pankreatik Nekroz'dur (IPN)."},
        {q: "SORU-73: Viral bir salgında (örneğin VHS), suya yüksek dozda antibiyotik uygulanmasının hastalığın seyrini iyileştirmemesinin temel farmakolojik nedeni nedir?", o: ["A) Virüslerin klorür iyonlarını taklit ederek antibiyotiği yapılarına katması", "B) Antibiyotiklerin hücre dışındaki bakterileri hedef alması, virüslerin ise \"hücre içi\" yapılar olması", "C) Virüslerin ortamdaki oksijeni tüketerek hipoksi yaratması", "D) Antibiyotiğin suyun alkalinitesini düşürmesi"], c: 1, e: "B - Virüsler 'hücre içi' obligat patojenler olduğu için, hücre dışını hedef alan antibiyotikler viral salgınlarda işe yaramaz."},
        {q: "SORU-74: Patojenleri klinik bulgularıyla eşleştiriniz.\nI. Saprolegnia spp. a) Spiral yüzme hareketi yaptıran viral hastalık.\nII. İnfeksiyöz Pankreatik Nekroz (IPN) b) İç organlarda şiddetli kanamalı yıkım yaratan viral hastalık.\nIII. Viral Hemorajik Septisemi (VHS) c) Pamukçuk lezyonları oluşturan fungal hastalık.", o: ["A) I-c, II-a, III-b", "B) I-a, II-b, III-c", "C) I-b, II-c, III-a", "D) I-c, II-b, III-a"], c: 0, e: "A - Saprolegnia (c) fungal pamukçuktur. IPN (a) spiral yüzme yaptırır. VHS (b) kanamalı virüstür."},
        {q: "SORU-75: Fungal hastalıkların (mantarların) kültür ortamlarında ortaya çıkmasını tetikleyen temel çevresel/fizyolojik mekanizma nedir?", o: ["A) Virüslerin mutasyon geçirmesi", "B) Sadece hiperkapni ortamlarında hayatta kalabilmesi", "C) Fiziksel travmaların koruyucu mukus bariyerini yıkarak mantara giriş kapısı (sekonder istila) açması", "D) pH'ın aniden yükselmesi"], c: 2, e: "C - Fungal hastalıklar fırsatçı (sekonder) patojenlerdir; mukus bariyeri yıkıldığında dokuya yerleşebilirler."},
        {q: "SORU-76: Saprolegnia spp. enfeksiyonunda mantarın balığı ölüme götüren asıl patofizyolojik silahı metinde nasıl açıklanmıştır?", o: ["A) \"Hif\" adı verilen ipliksi uzantılarının dokuya girip delikler açarak balığın \"osmoregülatör çöküş\" yaşamasına neden olması", "B) Solungaçlarda amonyak sentezini durdurması", "C) Kan dolaşımına girerek hemoglobindeki demiri yükseltgemesi", "D) Ekzoftalmus tablosunu yaratması"], c: 0, e: "A - Mantarın asıl ölümcül etkisi, 'Hif' adlı ipliksi yapılarının dokuya girip balıkta osmoregülatör çöküş yaratmasıdır."},
        {q: "SORU-77: Mantar tedavisinde eskiden kullanılan \"Malahit Yeşili\" adlı kimyasalın günümüzde kesin olarak yasaklanmasının nedeni nedir?", o: ["A) Suyun oksijen taşıma kapasitesini sıfırlaması", "B) Karsinojenik (kanser yapıcı) etkilere sahip olmasının tespit edilmesi", "C) Dirençli suşlar yaratması", "D) Kromatoforları tahrip etmesi"], c: 1, e: "B - Malahit Yeşilinin yasaklanma nedeni metinde açıkça 'karsinojenik (kanser yapıcı) etkilere sahip olması' olarak belirtilmiştir."},
        {q: "SORU-78: Viral enfeksiyonlara karşı antibiyotiklerin veya kimyasal banyoların işe yaramaması, su ürünleri işletmelerini hastalıklar ortaya çıkmadan önceki süreçlere odaklanmaya zorlar. Metne göre bu yönetimsel \"koruyucu hekimlik\" stratejisinin genel adı nedir?", o: ["A) Profilaksi (Aşılama ve Biyogüvenlik)", "B) Dilüsyon etkisi", "C) Taşıma kapasitesinin (Carrying capacity) artırılması", "D) Henry Yasası"], c: 0, e: "A - Hastalık gelmeden önce alınan aşı ve biyogüvenlik gibi koruyucu hekimlik uygulamalarına 'Profilaksi' denilmektedir."},
        {q: "SORU-79: Terimleri tanımlarıyla eşleştiriniz.\nI. Hif a) Hastalıklar henüz ortaya çıkmadan önce uygulanan biyogüvenlik önlemleri.\nII. Profilaksi b) Mantarların dokuya nüfuz eden kök benzeri ipliksi uzantıları.\nIII. Obligat hücre içi patojen c) Çoğalmak için konakçı hücresine girmek zorunda olan ajan.", o: ["A) I-b, II-a, III-c", "B) I-a, II-c, III-b", "C) I-c, II-b, III-a", "D) I-b, II-c, III-a"], c: 0, e: "A - Hif (b) mantarın yapısıdır. Profilaksi (a) koruyucu hekimliktir. Obligat hücre içi patojen (c) virüslerin yaşam tarzıdır."},
        {q: "SORU-80: İnfeksiyöz Pankreatik Nekroz (IPN) ve Saprolegnia spp. arasındaki en belirgin patolojik fark aşağıdakilerden hangisidir?", o: ["A) IPN sekonder bir fırsatçı, Saprolegnia obligat hücre içi bir patojendir.", "B) IPN karsinojenik kimyasallarla, Saprolegnia aşı ile tedavi edilir.", "C) IPN hücre içine yerleşen birincil bir viral etken iken; Saprolegnia deri tahribatıyla dokuyu saran sekonder bir fungal etkendir.", "D) Her ikisi de Gram-negatif bakterilerin yarattığı septisemi tablosudur."], c: 2, e: "C - IPN birincil viral bir hastalıktır. Saprolegnia ise deri tahribatını bekleyen sekonder fungal bir hastalıktır."}
    ];

    let currentQuestions = [...quizData];
    let currentIndex = 0;
    let solvedIndex = -1; 
    let userAnswers = {}; 

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const statusText = document.getElementById('statusText');
    const remainingCountEl = document.getElementById('remainingCount');
    const explanationEl = document.getElementById('explanation');
    const reaskBadge = document.getElementById('reaskBadge');

    function loadQuestion() {
        const q = currentQuestions[currentIndex];
        
        // Tekrar sorulan soruysa uyarı rozetini göster
        reaskBadge.style.display = q.isReasked ? 'inline-block' : 'none';

        const splitIndex = q.q.indexOf(':');
        if (splitIndex !== -1) {
            const questionNumber = q.q.substring(0, splitIndex + 1); 
            const questionText = q.q.substring(splitIndex + 1);      
            questionEl.innerHTML = `${questionNumber} <br><span class="lesson-name">(${lessonTitle})</span><br> ${questionText}`;
        } else {
            questionEl.textContent = q.q;
        }

        optionsEl.innerHTML = '';
        explanationEl.style.display = 'none';
        
        updateStatusCounters();

        q.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            
            // Eğer soru daha önce (bu indexte) çözüldüyse durumu ekrana geri yükle
            if (currentIndex <= solvedIndex) {
                btn.disabled = true;
                let answered = userAnswers[currentIndex];
                
                // İşaretlediği şıkkı renklendir
                if (index === answered) {
                    if (answered === q.c) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                    }
                }

                // Çözümü Gösterme Mantığı
                let showSolution = (answered === q.c) || (q.isReasked && answered !== q.c);

                if (showSolution) {
                    if (index === q.c) {
                        btn.classList.add('correct');
                    }
                    explanationEl.innerHTML = `<strong>Çözüm:</strong> ${q.e}`;
                    explanationEl.style.display = 'block';
                }

            } else {
                btn.onclick = () => selectOption(index);
            }
            optionsEl.appendChild(btn);
        });

        updateNavButtons();
    }

    function selectOption(selectedIndex) {
        const q = currentQuestions[currentIndex];
        userAnswers[currentIndex] = selectedIndex;
        solvedIndex = Math.max(solvedIndex, currentIndex);

        const buttons = optionsEl.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        let isCorrect = (selectedIndex === q.c);

        if (isCorrect) {
            // DOĞRU CEVAP
            buttons[selectedIndex].classList.add('correct');
            explanationEl.innerHTML = `<strong>Çözüm:</strong> ${q.e}`;
            explanationEl.style.display = 'block';
        } else {
            // YANLIŞ CEVAP
            buttons[selectedIndex].classList.add('wrong');
            
            if (!q.isReasked) {
                // İlk defa yanlış yaptı: Çözümü gizle, soruyu 5 adım sonraya (veya en sona) kopyala
                explanationEl.style.display = 'none';
                
                let insertIndex = currentIndex + 6;
                if (insertIndex > currentQuestions.length) {
                    insertIndex = currentQuestions.length;
                }
                
                // Soruyu "isReasked: true" etiketiyle listeye dahil et
                currentQuestions.splice(insertIndex, 0, { ...q, isReasked: true });
                
            } else {
                // Tekrar sorulan soruyu YİNE yanlış yaptı: Doğruyu ve çözümü göster
                buttons[q.c].classList.add('correct');
                explanationEl.innerHTML = `<strong>Çözüm:</strong> ${q.e}`;
                explanationEl.style.display = 'block';
            }
        }
        
        updateStatusCounters();
        updateNavButtons();
    }

    function updateStatusCounters() {
        statusText.textContent = `Soru: ${currentIndex + 1} / ${currentQuestions.length}`;
        let remaining = currentQuestions.length - (currentIndex + 1);
        remainingCountEl.textContent = `Kalan Soru: ${remaining}`;
    }

    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);

        if (currentIndex <= solvedIndex) {
            nextBtn.style.visibility = 'visible';
            if(currentIndex === currentQuestions.length - 1) {
                nextBtn.textContent = "Sınavı Bitir";
            } else {
                nextBtn.textContent = "Sonraki ❯";
            }
        } else {
            nextBtn.style.visibility = 'hidden';
        }
    }

    function goForward() {
        if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            loadQuestion();
        } else {
            alert("Tebrikler! 80 soruluk Tier-0 Eğitim setini ve tekrarlarını başarıyla tamamladınız.");
            location.reload();
        }
    }

    function goBack() {
        if (currentIndex > 0) {
            currentIndex--;
            loadQuestion();
        }
    }

    loadQuestion();
</script>
