<script>
    const lessonTitle = "Balık Hastalıkları ve Yetiştiricilik Yönetimi";

    // TAM 100 SORULUK VERİTABANI
    const quizData = [
        {q: "SORU-1: Hastalıkların ortaya çıkışında \"konakçı-patojen-çevre\" üçgenindeki dengenin bozulması esastır. Bu bağlamda metne göre stres, balık hastalıklarının patogenezinde ve epidemiyolojisinde nasıl bir faktör olarak tanımlanmaktadır?", o: ["A) Etiyolojik faktör", "B) Predispoze (hazırlayıcı) faktör", "C) İnnate immunity (doğuştan gelen) faktörü", "D) Homeostazis faktörü"], c: 1, e: "B - Metinde stresin hastalıkların patogenezinde 'hazırlayıcı (predispoze) bir faktör' olarak kritik rol üstlendiği açıkça belirtilmiştir."},
        {q: "SORU-2: Aşağıdaki kavramları doğru tanımlarıyla eşleştiriniz.\nI. Homeostazis a) Canlının biyolojik sistemini harekete geçiren bir uyarımı takiben sistemin verdiği sonraki reaksiyonların tamamı.\nII. Stres Yanıtı b) Balığın doğuştan gelen direnci ve genel savunma mekanizması.\nIII. İnnate Immunity c) Çevresel, fizyolojik veya biyolojik faktörlerin baskısı altında balığın muhafaza edemediği normal fizyolojik dengesi.", o: ["A) I-c, II-a, III-b", "B) I-a, II-b, III-c", "C) I-b, II-c, III-a", "D) I-c, II-b, III-a"], c: 0, e: "A - Homeostazis (c) normal fizyolojik denge, Stres Yanıtı (a) uyarımı takiben verilen reaksiyonlar, İnnate Immunity (b) ise doğuştan gelen dirençtir."},
        {q: "SORU-3: Balıkların, karasal hayvanlara kıyasla çevresel değişimlere karşı çok daha hassas olmalarının temel fizyolojik nedeni metinde hangi kavramlarla açıklanmıştır?", o: ["A) Nöro-endokrin tepki zinciri başlatmaları", "B) Lenfopeni yaşamaları ve antikor kapasitelerinin düşmesi", "C) Poikiloterm (soğukkanlı) canlılar olmaları ve sucul ortamla sürekli ozmotik/iyonik etkileşim halinde bulunmaları", "D) Glukokortikoid hormonu olan kortisol düzeylerinin artış göstermesi"], c: 2, e: "C - Balıkların karasal hayvanlara kıyasla hassas olmalarının nedeni 'poikiloterm (soğukkanlı)' canlılar olmaları ve 'ozmotik ve iyonik etkileşim' halinde bulunmalarıdır."},
        {q: "SORU-4: Stres faktörüne maruz kalan balığın vücudunda başlayan nöro-endokrin tepki zincirinde, \"birincil stres yanıtı\" olarak salgılanan hormon grubu aşağıdakilerden hangisidir?", o: ["A) Kortikosteroidler", "B) Glukokortikoidler", "C) Kortisol", "D) Katekolaminler"], c: 3, e: "D - Metne göre nöro-endokrin tepki zincirinde birincil stres yanıtı olarak 'katekolaminler (adrenalin/noradrenalin)' salgılanır, bunu kortikosteroidler takip eder."},
        {q: "SORU-5: Stresli koşullarda kanda belirgin bir artış gösteren kortisol hormonunun, balığın metabolizması ve bağışıklık sistemi üzerindeki sentezlenmiş etkisi aşağıdakilerden hangisidir?", o: ["A) Enerji kaynaklarını \"savaş veya kaç\" tepkisi için mobilize ederken, hayati olmayan diğer sistemleri ve bağışıklığı baskılar.", "B) Balığın adaptasyon yeteneğini zorlayarak anında tükenme evresine geçmesini ve somatik büyüme oranının artmasını sağlar.", "C) İnnate immunity'yi güçlendirerek fırsatçı patojenlere karşı duyarlılık artışını tek başına engeller.", "D) Birincil stres yanıtı olarak adrenalin salgılanmasını durdurur ve lenfosit sayısında artışa neden olur."], c: 0, e: "A - Kortisol, enerji kaynaklarını savaş/kaç tepkisi için mobilize ederken, hayati olmayan diğer sistemleri (ve bağışıklığı) baskılar."},
        {q: "SORU-6: Yüksek kortisol seviyesi etkisi altında, balığın bağışıklık sistemi normal işleyişinde bozulur ve lenfosit sayısında azalmaya yol açar. Bu azalma durumu klinik olarak nasıl adlandırılmaktadır?", o: ["A) Homeostazis", "B) Lenfopeni", "C) Poikiloterm", "D) Etiyoloji"], c: 1, e: "B - Yüksek kortisol altında bağışıklık bozulur ve lenfosit sayısındaki azalmaya metinde 'lenfopeni' adı verilmiştir."},
        {q: "SORU-7: Stresin ileri aşamalarında, balık fizyolojisinin \"tükenme\" evresine girmesinin geri dönüşümü olmayan fizyolojik sonuçları arasında aşağıdakilerden hangisi gösterilemez?", o: ["A) Üreme oranının düşmesi", "B) Somatik büyüme oranında azalma", "C) Fırsatçı patojenlere karşı duyarlılık artışı ve ölüm", "D) Anabolik (yapım) faaliyetlerin hızlanması"], c: 3, e: "D - Tükenme evresinde üreme düşer, büyüme azalır, ölüm görülür. 'Anabolik faaliyetlerin hızlanması' yanlış çeldiricidir; metinde anabolik (yapım) faaliyetlerin 'durduğu' belirtilir."},
        {q: "SORU-8: Aşağıdaki stres türlerini ve kaynaklarını doğru tanımlarıyla eşleştiriniz.\nI. Akut Stres a) Sürekli devam eden ve balığın adaptasyon yeteneğini zorlayan durum.\nII. Kronik Stres b) Aşırı stoklama yoğunluğu ve subletal amonyak varlığı.\nIII. Kronik Stres Kaynakları c) Dakika veya saatlerle ifade edilebilen kısa süreli uyarılar.", o: ["A) I-b, II-a, III-c", "B) I-c, II-a, III-b", "C) I-a, II-c, III-b", "D) I-c, II-b, III-a"], c: 1, e: "B - Akut stres (c) kısa süreli uyarılardır. Kronik stres (a) adaptasyonu zorlayan uzun vadeli durumdur. Kronik stres kaynakları (b) ise aşırı stoklama ve amonyak varlığıdır."},
        {q: "SORU-9: Aşağıdakilerden hangisi balık yetiştiriciliğinde karşılaşılan \"Akut Stres\" kaynaklarından biri değildir?", o: ["A) Kısa süreli elden geçirme işlemleri", "B) Hastalık tedavisi uygulamaları", "C) Su kalitesindeki ani dalgalanmalar", "D) Balıkların yaşam alanının daralması ve sosyal rekabet (aşırı stoklama yoğunluğu)"], c: 3, e: "D - 'Aşırı stoklama yoğunluğu' ve 'sosyal rekabet' metinde Akut Stres değil, Kronik Stres kaynakları altında listelenmiştir."},
        {q: "SORU-10: Kronik strese yol açan ve su kalitesi parametrelerinin sürekli kötü kalmasıyla karakterize edilen durum metinde hangi spesifik örnekle açıklanmıştır?", o: ["A) Subletal düzeyde sürekli amonyak varlığı", "B) Birincil stres yanıtı olarak noradrenalin varlığı", "C) Su ortamıyla sürekli ozmotik etkileşim varlığı", "D) Glukokortikoid hormonunun sürekli uyarımı"], c: 0, e: "A - Sürekli kötü su kalitesine maruz kalmanın örneği olarak metinde parantez içinde '(örneğin subletal düzeyde sürekli amonyak varlığı)' ifadesi kullanılmıştır."},
        {q: "SORU-11: Stres hormonlarının balığın morfolojisi ve davranışları üzerindeki ilk etkilerinden biri renk değişimleridir. Metne göre balıklarda gözlenen bu renk değişimlerinin fizyolojik temeli hangi hücresel yapı üzerindeki etkileşimle açıklanmaktadır?", o: ["A) Kromatoforlar", "B) Lenfositler", "C) Eritrositler", "D) Solungaç lamelleri"], c: 0, e: "A - Metinde stres hormonlarının doğrudan 'kromatoforlar' üzerindeki etkisiyle renk değişimlerinin görüldüğü açıkça ifade edilmiştir."},
        {q: "SORU-12: Stres altında kalan balıklarda beslenme ve büyüme fizyolojisi sekteye uğrar. Alınan yemin metabolik enerjiye dönüşümünün bozulması durumunun temel göstergesi aşağıdakilerden hangisidir?", o: ["A) Yem değerlendirme oranında (FCR) kötüleşme gözlenmesi", "B) Somatik büyüme oranının stabil şekilde ilerlemesi", "C) Anabolik faaliyetlerin kalıcı olarak hızlanması", "D) Doğuştan gelen direncin (innate immunity) artması"], c: 0, e: "A - Alınan yemin metabolik enerjiye dönüşümünün bozulması durumunda, 'yem değerlendirme oranında (FCR) kötüleşme' gözlendiği belirtilmiştir."},
        {q: "SORU-13: Aşağıdaki kimyasal stres kaynakları ve balık fizyolojisindeki etkilerini eşleştiriniz.\nI. İyonize olmamış amonyak (NH3) a) Hücre zarlarından geçerek merkezi sinir sistemini etkiler.\nII. Nitrit (NO2-) b) Kanda hemoglobine bağlanarak oksijen taşınımını engeller.\nIII. Metabolik artık yükü c) Dışkı ve organik yükün parçalanmasıyla toksik etki yaratır.", o: ["A) I-a, II-b, III-c", "B) I-b, II-a, III-c", "C) I-c, II-b, III-a", "D) I-a, II-c, III-b"], c: 0, e: "A - Metinde NH3 merkezi sinir sistemini, NO2- oksijen taşınımını etkiler; dışkı ise parçalanarak toksik etki yaratan metabolik artıktır."},
        {q: "SORU-14: Nitritin kanda hemoglobine bağlanması sonucu oksijen taşınımının bloke edilmesi tablosu, klinik olarak aşağıdaki hastalıklardan hangisiyle adlandırılmaktadır?", o: ["A) Gaz Kabarcığı Hastalığı", "B) Methemoglobinemi (Kahverengi Kan Hastalığı)", "C) Lenfopeni", "D) Hipoksi"], c: 1, e: "B - Nitritin hemoglobine bağlanarak oksijen taşınmasını engellediği bu tablo, 'methemoglobinemi' olarak adlandırılır."},
        {q: "SORU-15: Su ürünleri yetiştiriciliğinde balık büyüklüklerinin çok farklı olması \"hiyerarşik stres\" adı verilen tabloya yol açar. Bu durumun canlı üzerindeki yansıması nedir?", o: ["A) Kromatoforlarda ani renk açılması", "B) Büyük balıkların küçükler üzerinde baskı kurması ve yeme ulaşımın engellenmesi", "C) Su kalitesindeki amonyak miktarını doğrudan artırması", "D) Ozmotik dengesini bozarak toleransın tamamen yitirilmesi"], c: 1, e: "B - Balık büyüklüklerinin farklı olması, büyüklerin küçükler üzerinde baskı kurmasına ve onların yeme ulaşımını engellemesine neden olur."},
        {q: "SORU-16: Balıklarda \"Gaz Kabarcığı Hastalığı\"nın ortaya çıkmasına neden olan asıl fiziksel faktör aşağıdakilerden hangisidir?", o: ["A) Gazların (O2, N2) suda aşırı doygunluk seviyesine ulaşması", "B) Sudaki oksijenin yetersiz kalması (hipoksi)", "C) Ani sıcaklık değişimleri", "D) Fotoperiyodun aşırı düzensizliği"], c: 0, e: "A - Çözünmüş gazlarda oksijen ve azot gazlarının aşırı doygunluğu doğrudan 'Gaz kabarcığı hastalığına' yol açar."},
        {q: "SORU-17: İşletmelerde uygulanan boylama, yakalama ve ağ değiştirme gibi işlemler mekanik stres yaratır. Bu tür müdahalelerin balığın sekonder enfeksiyonlara açık hale gelmesine zemin hazırlamasının temel nedeni nedir?", o: ["A) Kortikosteroid seviyesini anında sıfırlaması", "B) Merkezî sinir sistemini baskılaması", "C) Balığın en önemli koruyucu bariyeri olan mukus tabakasına zarar vermesi", "D) Yem değerlendirme oranını kalıcı olarak artırması"], c: 2, e: "C - Elden geçirme işlemleri, balığın 'mukus tabakasına' hasar verir; enfeksiyonlara zemin hazırlayan kök neden mukus hasarıdır."},
        {q: "SORU-18: Aşağıdaki stres faktörlerini, ait oldukları ana stres kaynağı kategorisi ile eşleştiriniz.\nI. Hipoksi a) Yetiştiricilik İşlemlerine Bağlı Stres\nII. Hatalı dozajda tedavi b) Fiziksel Stres\nIII. Kirlilik c) Kimyasal Stres", o: ["A) I-b, II-a, III-c", "B) I-a, II-b, III-c", "C) I-c, II-a, III-b", "D) I-b, II-c, III-a"], c: 0, e: "A - Hipoksi Fiziksel, Hatalı tedavi Yetiştiricilik işlemi, Kirlilik ise Kimyasal stres kaynağıdır."},
        {q: "SORU-19: \"Nakil (taşıma)\" işlemi kompleks bir süreci ifade eder. Aşağıdakilerden hangisi balık nakli sırasında bir araya gelen bu kompleks stres unsurlarından biri olarak değerlendirilmez?", o: ["A) Sarsıntı", "B) Sıkışıklık", "C) Hiyerarşik stres", "D) Su kalitesi değişimleri"], c: 2, e: "C - Metinde nakil kompleksinin unsurları sarsıntı, sıkışıklık ve su kalitesi değişimidir. Hiyerarşik stres Biyolojik kaynaktır."},
        {q: "SORU-20: Stresin \"yönetilebilir\" düzeyde tutulması işletmeye çeşitli avantajlar sağlar. Aşağıdakilerden hangisi bu avantajlardan biri değildir?", o: ["A) Balıkların büyüme performansının artması", "B) Fırsatçı patojenlerin su ortamından tamamen izole edilerek yok edilmesi", "C) Kullanılan yem maliyetlerinin işletme lehine düşmesi", "D) Hastalık kaynaklı oluşabilecek ölümlerin engellenmesi"], c: 1, e: "B - Stresin yönetilmesi büyümeyi artırır, maliyeti düşürür. Patojenlerin ortamdan tamamen izole edilmesi uydurulmuş bir çeldiricidir."},
        {q: "SORU-21: Yetiştiricilik sistemlerinde hastalık etmenlerinin konakçıya ulaşmasını kolaylaştıran bir \"vektör\" görevi gören asıl fiziksel/biyolojik durum aşağıdakilerden hangisidir?", o: ["A) Doğal ortamda geniş su kütlelerinde düşük yoğunlukta yaşanması", "B) Yüksek debili taze su girişi", "C) Kültür ortamında sınırlı hacimde yüksek biyokütle (stoklama) ile bulunulması", "D) Sıvı ortam dışında gerçekleştirilmesi"], c: 2, e: "C - Sınırlı hacimde yüksek biyokütle ile bulunulmasının hastalık etmenlerinin konakçıya ulaşmasında vektör görevi gördüğü ifade edilmiştir."},
        {q: "SORU-22: Patoloji kuralı bağlamında, enfeksiyon tablosunun başlamasına yol açan asıl neden-sonuç mekanizması aşağıdakilerden hangisidir?", o: ["A) Sadece patojenin ortamda kendi kendine çoğalmaya başlaması", "B) Çevresel stres faktörlerinin balığın bağışıklık sistemini baskılamasıyla çevresel koşulların bozulması", "C) BOİ'nin balıklar lehine artması", "D) Patojenlerin yüksek oksijene maruz kalması"], c: 1, e: "B - Enfeksiyonu başlatan unsur sadece patojenin varlığı değil; çevresel stres faktörlerinin balığın bağışıklık sistemini baskılamasıdır."},
        {q: "SORU-23: Yoğun (intensif) balık yetiştiriciliğinde, \"bol su\" kullanımının ortamdaki metabolik atıkları uzaklaştırarak uygun su koşullarını devam ettirmesi mekanizması metinde hangi kavramla ifade edilmiştir?", o: ["A) Taşıma kapasitesi", "B) Bohr etkisi", "C) Ötrofikasyon etkisi", "D) Dilüsyon (seyreltme) etkisi"], c: 3, e: "D - Yüksek debili taze su girişinin atıkları seyrelterek uzaklaştırmasına '(dilüsyon etkisi)' denilmiştir."},
        {q: "SORU-24: Aşağıdaki su kalitesini belirleyen üç ana faktörü eşleştiriniz.\nI. Kullanılan Suyun Özelliği a) Havuz tipi (beton, toprak) ve mühendislik detayları.\nII. Sistemin Yapısı b) Kaynak suyunun başlangıçtaki fiziko-kimyasal yapısı.\nIII. Yönetim c) Yemleme rejimi, stok kontrolü ve hijyen.", o: ["A) I-b, II-a, III-c", "B) I-a, II-b, III-c", "C) I-c, II-b, III-a", "D) I-b, II-c, III-a"], c: 0, e: "A - Kullanılan Su (b), Sistemin Yapısı (a), Yönetim ise yemleme ve hijyen uygulamalarıdır (c)."},
        {q: "SORU-25: Amonyak suda farklı formlarda bulunur. Özellikle hücre zarlarından kolayca geçebildiği için balıklar için \"son derece toksik\" olan amonyak formu aşağıdakilerden hangisidir?", o: ["A) Nitrat (NO3-)", "B) İyonize (NH4+) form", "C) İyonize olmamış (NH3) form", "D) Nitrit (NO2-)"], c: 2, e: "C - Metne göre özellikle 'iyonize olmamış (NH3) formu', hücre zarlarından geçebildiği için son derece toksiktir."},
        {q: "SORU-26: Biyolojik Oksijen İhtiyacı (BOİ) seviyesinin yüksek olmasının balık fizyolojisini dolaylı yoldan tehdit etmesinin temel nedeni nedir?", o: ["A) Amonyağın oksitlenerek tamamen yok olmasını sağlaması", "B) Organik maddelerin parçalanması sırasında oksijenin bakteriler tarafından tüketilmesine neden olması", "C) Suyun pH'ını düşürerek bazik hale getirmesi", "D) AKM'nin solungaç lamellerini onarması"], c: 1, e: "B - Yüksek BOİ'nin doğrudan sonucu, çözünmüş oksijenin mikroorganizmalar/bakteriler tarafından tüketilmesidir."},
        {q: "SORU-27: Yüksek karbondioksit (CO2) seviyelerinin (hiperkapni), kan pH'ını etkileyerek \"oksijenin hemoglobine bağlanmasını zorlaştırması\" olayı metinde hangi terimle açıklanmıştır?", o: ["A) Methemoglobinemi", "B) Bohr etkisi", "C) Hiperplazi", "D) Ötrofikasyon"], c: 1, e: "B - Yüksek CO2'nin kan pH'ını etkileyerek oksijenin hemoglobine bağlanmasını zorlaştırması olayına '(Bohr etkisi)' adı verilmiştir."},
        {q: "SORU-28: Su kalitesi parametrelerinden Fosfor'un (P) doğrudan toksik olmamakla birlikte dolaylı yoldan su kalitesini bozmasının nedeni aşağıdakilerden hangisidir?", o: ["A) Alıcı ortamlarda alg patlamasına (ötrofikasyon) neden olması", "B) Solungaç lamellerini tıkayarak mekanik hasar vermesi", "C) Hemoglobine bağlanarak oksijen taşıma kapasitesini bloke etmesi", "D) Patojen bakteriler için tutunma yüzeyi oluşturması"], c: 0, e: "A - Fosfor toksik olmamasına rağmen 'alıcı ortamlarda ötrofikasyona' neden olarak dolaylı yoldan su kalitesini bozar."},
        {q: "SORU-29: Kritik su kalitesi parametrelerini, patolojik etkileriyle eşleştiriniz.\nI. Nitrit (NO2-) a) Eksikliği boğulmaya neden olur.\nII. Çözünmüş Oksijen b) Hemoglobine bağlanarak kahverengi kan hastalığı yapar.\nIII. Askıdaki Katı Madde c) Solungaç lamellerini tıkayarak mekanik hasar verir.", o: ["A) I-c, II-b, III-a", "B) I-a, II-c, III-b", "C) I-b, II-a, III-c", "D) I-b, II-c, III-a"], c: 2, e: "C - Nitrit (b) Kahverengi kan hastalığı yapar, Oksijen eksikliği (a) boğulmaya neden olur, AKM (c) solungaçları tıkar."},
        {q: "SORU-30: \"Doğru Stoklama Yoğunluğu\" belirlenirken, işletmenin hangi spesifik kapasite sınırını aşmaması gerektiği vurgulanmıştır?", o: ["A) Alkalinite sınırı", "B) Taşıma kapasitesi (carrying capacity)", "C) Dilüsyon etkisi", "D) Biyolojik oksijen ihtiyacı (BOİ)"], c: 1, e: "B - Doğru stoklama yoğunluğu tanımlanırken 'sistemin taşıma kapasitesini (carrying capacity) aşmayan' ifadesi kullanılmıştır."},
        {q: "SORU-31: Gaz Kabarcığı Hastalığı'nın patofizyolojisi, çözünmüş gazların sıvı fazdan gaz fazına geçme eğilimini açıklayan hangi fiziksel prensibe dayanır?", o: ["A) Henry Yasası", "B) Bohr Etkisi", "C) Dilüsyon Etkisi", "D) Methemoglobinemi Yasası"], c: 0, e: "A - Metinde hastalığın patofizyolojisinin 'Henry Yasası' prensiplerine dayandığı ve emboli oluşumunu açıkladığı belirtilmiştir."},
        {q: "SORU-32: Aşağıdaki azotlu bileşikleri özellikleriyle eşleştiriniz.\nI. Amonyak (NH3) a) Nitrosomonas bakterilerince oksitlenerek oluşan ve klorürü taklit eden bileşik.\nII. Nitrit (NO2-) b) Balığın %90 oranında doğrudan suya bıraktığı temel atık.\nIII. Nitrat (NO3-) c) En az toksik form.", o: ["A) I-b, II-a, III-c", "B) I-a, II-b, III-c", "C) I-c, II-a, III-b", "D) I-b, II-c, III-a"], c: 0, e: "A - Amonyak (b) temel artıktır, Nitrit (a) Nitrosomonas oksidasyonuyla oluşur, Nitrat (c) ise en az toksik formdur."},
        {q: "SORU-33: Amonyağın hücre zarlarından kolayca geçen çok daha \"toksik forma\" (NH3) kaymasını tetikleyen temel çevresel değişiklik aşağıdakilerden hangisidir?", o: ["A) Su ortamındaki klorür iyonlarının artması", "B) Su ortamında pH değerinin ve sıcaklığın artması", "C) Oksijen miktarının aşırı doygunluğa ulaşması", "D) Mikrobiyal bozunmasının durması"], c: 1, e: "B - Metinde, 'su ortamında pH ve sıcaklık arttığında, kimyasal dengenin toksik forma (NH3) kaydığı' net bir şekilde ifade edilmiştir."},
        {q: "SORU-34: Balıkların, tükettikleri azotlu atıklarını \"üreye çevirmek yerine\" ağırlıklı olarak amonyak şeklinde suya bırakmalarının temel fizyolojik nedeni nedir?", o: ["A) Amonyağın sinir sistemini uyarması", "B) Solungaç hasarını önlemesi", "C) Enerji tasarrufu sağlamak amacı taşıması", "D) Klorür (Cl-) iyonlarının yetersiz bulunması"], c: 2, e: "C - Metinde, balıkların azotlu atıklarını üreye çevirmek yerine 'enerji tasarrufu sağlamak amacıyla' doğrudan amonyak olarak attığı yazmaktadır."},
        {q: "SORU-35: Tatlı su balıklarında nitrit, hangi spesifik iyonu \"taklit ederek\" aktif taşıma yoluyla solungaçlardan kana geçmektedir?", o: ["A) Kalsiyum (Ca+2)", "B) Klorür (Cl-)", "C) Karbonat (CO3-2)", "D) Amonyum (NH4+)"], c: 1, e: "B - Metinde, 'tatlı su balıklarında nitrit, sudaki klorür (Cl-) iyonlarını taklit ederek aktif taşıma yoluyla vücuda girer' denilmektedir."},
        {q: "SORU-36: Nitrit zehirlenmesinde (Methemoglobinemi), suyun oksijen düzeyi yüksek olsa bile balıkta \"içsel bir boğulma\" meydana gelir. Bunun patolojik nedeni nedir?", o: ["A) Oksijenin emboli oluşturması", "B) Amonyağın solungaç epitelini zayıflatması", "C) Nitritin hemoglobin molekülündeki demiri yükseltgeyerek kanın oksijen bağlama kapasitesini yok etmesi", "D) Böbrek fonksiyonlarını durdurması"], c: 2, e: "C - Nitritin hemoglobindeki demiri yükseltgediğini, kanın oksijen bağlayamadığını ve içsel boğulma yaşandığını açıklar."},
        {q: "SORU-37: Klinik bulguları toksisite durumlarıyla eşleştiriniz.\nI. Göz fırlaması (ekzoftalmus) a) Akut Amonyak Zehirlenmesi\nII. Çikolata kahverengisi kan b) Gaz Kabarcığı Hastalığı\nIII. Nörolojik bozukluklar c) Methemoglobinemi", o: ["A) I-b, II-c, III-a", "B) I-a, II-b, III-c", "C) I-b, II-a, III-c", "D) I-c, II-b, III-a"], c: 0, e: "A - Göz fırlaması Gaz Kabarcığı (b), kahverengi kan Methemoglobinemi (c), nörolojik bozukluklar Amonyak zehirlenmesinde (a) görülür."},
        {q: "SORU-38: Kronik amonyak zehirlenmesinin \"Bakteriyel Solungaç Hastalığı\" için hazırlayıcı faktör olmasının temel mekanizması nedir?", o: ["A) Demir iyonlarını bağlaması", "B) Gaz eğilimini durdurması", "C) Solungaç epitelini zayıflatarak hücresel hasar (hiperplazi/nekroz) yaratması", "D) Klorür aktif taşıma pompalarını kapatması"], c: 2, e: "C - Subletal amonyağın solungaç epitelini zayıflatarak hücresel hasar oluşturduğu ve enfeksiyonlara hazırlayıcı faktör görevi gördüğü belirtilir."},
        {q: "SORU-39: Gaz Kabarcığı Hastalığı'nda oluşan gaz embolileri ölümcüldür. Bu hastalığın balığı öldüren nihai mekanizması aşağıdakilerden hangisidir?", o: ["A) Kılcal damarlarda kan akışının gaz kabarcıkları tarafından mekanik olarak bloke edilmesi (iskemi)", "B) Nörolojik şoka sokması", "C) Biyokimyasal reaksiyonla oksijeni sıfırlaması", "D) Osmoregülasyon sistemini çökerterek aşırı su almasına neden olması"], c: 0, e: "A - Gaz kabarcıklarının hayati organlarda kılcal damarları tıkayarak kan akışını bloke etmesi (iskemi) ölümcül tablonun asıl nedenidir."},
        {q: "SORU-40: Azot döngüsünde nitrifikasyonun ilk basamağını gerçekleştiren ve \"amonyağı oksitleyerek nitrite dönüştüren\" bakteri türü hangisidir?", o: ["A) Flavobacterium sp.", "B) Nitrosomonas sp.", "C) Methemoglobin sp.", "D) İyonize amonyum"], c: 1, e: "B - Metinde, amonyağı oksitleyerek nitrit oluşumunu sağlayan bakterilerin 'Nitrosomonas türü' olduğu açıkça belirtilmiştir."},
        {q: "SORU-41: Nitrat birikiminin engellenemeyip kronikleşerek temel bir problem haline geldiği işletme modeli aşağıdakilerden hangisidir?", o: ["A) Sınırlı Su Değişimli Sistemler (RAS - Resirküle Sistemler)", "B) Sürekli su değişiminin olduğu akıntılı sistemler", "C) Mikroorganizmaların yoğun olduğu dış havuzlar", "D) Yüksek debili işletmeler"], c: 0, e: "A - Metne göre Sınırlı Su Değişimli Sistemlerde (RAS) nitrat birikimi engellenemediği için kronik seviyelere ulaşır."},
        {q: "SORU-42: Nitrat miktarına \"en çok dikkat edilmesi gereken ve düşük tutulmasının elzem olduğu\" üretim aşaması neresidir?", o: ["A) Yetişkin balıkların bulunduğu havuzlar", "B) Gelişim aşamasındaki embriyo ve larvaların bulunduğu kuluçkahaneler", "C) Boylama üniteleri", "D) Taşıma tankları"], c: 1, e: "B - Yetişkinler tolere etse de, embriyoların hassasiyeti nedeniyle 'kuluçkahanelerde' nitrata dikkat edilmelidir."},
        {q: "SORU-43: \"Yoğun su ürünleri yetiştiricilik sistemlerinde\" sistemin temel karbondioksit (CO2) kaynağı aşağıdakilerden hangisidir?", o: ["A) Amonyağın atılamaması", "B) Alkalinitenin sıfırlanması", "C) Fitoplanktonların fotosentez reaksiyonları", "D) Birim hacimdeki biyokütlenin (balıkların) metabolik solunum faaliyetleri"], c: 3, e: "D - Yoğun sistemlerde biyokütle arttıkça CO2 seviyesini belirleyen temel kaynak balık metabolizmasıdır."},
        {q: "SORU-44: Kandaki CO2 miktarının yükselmesiyle karakterize edilen tabloya ne ad verilmektedir?", o: ["A) Methemoglobinemi", "B) Hiperkapni", "C) Nefrokalsinozis", "D) Lenfopeni"], c: 1, e: "B - Difüzyon kuralları gereği kandaki karbondioksit miktarının yükseldiği bu tabloya 'Hiperkapni' adı verilir."},
        {q: "SORU-45: Kanın asitleşmesinin hemoglobinin oksijene olan ilgisini azaltarak doku hipoksisine yol açması durumu, metinde hangi kavramla tanımlanmaktadır?", o: ["A) Henry Yasası", "B) Bohr ve Root Etkisi", "C) Taşıma Kapasitesi", "D) İçsel oto-intoksikasyon"], c: 1, e: "B - Kanın asitleşmesinin hemoglobinin oksijene ilgisini azaltması mekanizması, 'Bohr ve Root Etkisi' olarak açıklanmıştır."},
        {q: "SORU-46: Suda bulunan aşırı miktardaki karbondioksitin balık fizyolojisi üzerinde yarattığı dolaylı sonuçlardan \"Nefrokalsinozis\"in fizyolojik karşılığı nedir?", o: ["A) Solungaçlarda hücre ölümü", "B) Demirin yükseltgenmesi", "C) Metabolik dengenin bozularak böbreklerde kalsiyum birikmesi (böbrek taşı)", "D) Ekzoftalmus"], c: 2, e: "C - Metinde karbondioksitin böbreklerde kalsiyum birikimini tetikleyerek 'böbrek taşı' oluşturmasına Nefrokalsinozis dendiği belirtilir."},
        {q: "SORU-47: Aşağıdaki kavramları eşleştiriniz.\nI. Hiperkapni a) Kanın asidik hale gelmesi.\nII. Respiratorik Asidoz b) Suyun tampon olma kapasitesi.\nIII. Alkalinite c) Kandaki karbondioksit miktarının yükselmesi.", o: ["A) I-c, II-a, III-b", "B) I-a, II-b, III-c", "C) I-b, II-c, III-a", "D) I-c, II-b, III-a"], c: 0, e: "A - Hiperkapni kandaki CO2 artışı, Respiratorik asidoz kanın asitleşmesi, Alkalinite tamponlama kapasitesidir."},
        {q: "SORU-48: Sisteme gelen suyun, pH düşüşüne karşı \"tampon olma kapasitesinin bulunmaması ve pH'ın çok hızlı azalması\" durumunun kimyasal nedeni nedir?", o: ["A) Suyun sertliğinin yüksek olması", "B) Suyun yumuşak ve hafif alkali (düşük alkalinite) bir yapıya sahip olması", "C) Oksijen miktarının inmesi", "D) Amonyağın iyonize formda bulunması"], c: 1, e: "B - Suyun yumuşak ve hafif alkali (düşük alkalinite) olması, pH değişimine karşı tampon olma kapasitesini yok eder."},
        {q: "SORU-49: Balığın kendi metabolik artığıyla zehirlenmesi olan \"içsel oto-intoksikasyon\" riskinin artmasına yol açan temel fizyolojik mekanizma nedir?", o: ["A) Düşük pH'lı (asidik) ortamın, balığın solungaçlarından amonyak atılımını zorlaştırması", "B) Gaz embolisi yaratması", "C) Nitritin kana girmesi", "D) Oksijen ilgisinin artması"], c: 0, e: "A - Asidik ortamda amonyak atımı zorlaşır, içerde kalan amonyak 'içsel oto-intoksikasyona' neden olur."},
        {q: "SORU-50: Asidik sulara maruz kalan balıkların solungaçlarında meydana gelen hasarın doğrudan sonucu olarak şekillenen ölümcül problem nedir?", o: ["A) Vücut tuzlarının (iyonların) kaybına bağlı \"ozmotik dengesizlik\"", "B) Kanın taşıma kapasitesinin sıfırlanmasına bağlı \"Kahverengi Kan\"", "C) Somatik büyümenin durması", "D) Kalıcı renk solması"], c: 0, e: "A - Asidik suda hasar gören solungaçlara bağlı olarak vücut tuzlarının kaybı ve 'ozmotik dengesizlik' meydana gelir."},
        {q: "SORU-51: Deri ve mukus tabakasının oluşturduğu, patojeni tanımaksızın genel bariyer sağlayan savunma mekanizması aşağıdakilerden hangisidir?", o: ["A) Non-spesifik (doğal) savunma mekanizması", "B) Spesifik (kazanılmış) savunma mekanizması", "C) Obligat patojen bariyeri", "D) Endoparaziter savunma"], c: 0, e: "A - Deri ve mukus tabakası, patojeni tanımaksızın genel bariyer sağlayan 'non-spesifik' savunma olarak tanımlanmıştır."},
        {q: "SORU-52: Patojen sınıflandırmasını eşleştiriniz.\nI. Obligat Patojen a) Normal koşullarda serbest yaşayan ancak stresli balıkta hastalık yapan etmen.\nII. Fakültatif Patojen b) Çoğalabilmek için kesinlikle canlı konakçıya ihtiyaç duyan etmen.", o: ["A) I-b, II-a", "B) I-a, II-b", "C) I-a, I-b", "D) II-b, II-a"], c: 0, e: "A - Obligat patojen (b) konakçıya zorunlu ihtiyaç duyar. Fakültatif (a) fırsat bulduğunda hastalık yapar."},
        {q: "SORU-53: Fakültatif (fırsatçı) patojenlerin aniden şiddetli bir salgına neden olmasının temel sebebi aşağıdakilerden hangisidir?", o: ["A) Patojenin zorunlu forma dönüşmesi", "B) Çevresel parametrelerin balığın mukus ve lenfosit savunmasını (bağışıklığını) baskılaması", "C) Dactylogyrus'un suyu asidik yapması", "D) Patojenin endoparazit formunda yaşaması"], c: 1, e: "B - Çevresel stresörlerin balığın savunma sistemini baskılaması patojene fırsat yaratır."},
        {q: "SORU-54: Hücresel yapılarına göre \"Metazoon\" parazitlerin yapısal özelliği aşağıdakilerden hangisidir?", o: ["A) Tek hücreden oluşmaları", "B) Çok hücreli olmaları ve karmaşık yapılara sahip olmaları", "C) Yalnızca fakültatif olmaları", "D) Tomit evresinde çoğalmaları"], c: 1, e: "B - Metazoonlar, 'çok hücreli' ve karmaşık yapıya sahip parazitlerdir."},
        {q: "SORU-55: Balıklarda \"Beyaz Benek Hastalığı\"na neden olan protozoon (tek hücreli) yıkıcı ektoparazit aşağıdakilerden hangisidir?", o: ["A) Dactylogyrus", "B) Gyrodactylus", "C) Ichthyophthirius multifiliis", "D) Fakültatif lenfosit"], c: 2, e: "C - Beyaz Benek Hastalığına neden olan tek hücreli protozoon Ichthyophthirius multifiliis'tir."},
        {q: "SORU-56: Beyaz Benek parazitinin yaşam döngüsünde kimyasal tedavilerin \"sadece belirli bir evrede\" işe yaramasının nedeni nedir?", o: ["A) Parazitin suya düştüğü serbest \"tomit\" evresinde ilaçlara karşı savunmasız kalması", "B) Kimyasalların yumurta kabuğunu eritebilmesi", "C) Antikorların paraziti yok etmesi", "D) Parazitin endoparazit olarak yaşaması"], c: 0, e: "A - Çoğalmak için suya düştüğü 'serbest yüzen tomit evresi' kimyasal müdahalenin işe yaradığı tek zayıf noktadır."},
        {q: "SORU-57: Monogenean trematod türlerini eşleştiriniz.\nI. Dactylogyrus a) Deriye yerleşen ve canlı doğuran ektoparazit.\nII. Gyrodactylus b) Solungaçlara yerleşen ve yumurtlayarak çoğalan ektoparazit.", o: ["A) I-b, II-a", "B) I-a, II-b", "C) I-a, I-b", "D) II-b, II-a"], c: 0, e: "A - Dactylogyrus (b) solungaçlara yerleşip yumurtlar. Gyrodactylus (a) deriye yerleşip canlı doğurur."},
        {q: "SORU-58: Metne göre \"solungaçlara\" yerleşerek solunum epitelinde hasar yaratan spesifik parazit türü hangisidir?", o: ["A) Tomit", "B) Gyrodactylus", "C) Trofozoit", "D) Dactylogyrus"], c: 3, e: "D - Metinde Dactylogyrus'un hedef organının 'solungaçlar' olduğu belirtilmiştir."},
        {q: "SORU-59: Gyrodactylus parazitinin konakçı popülasyonunda \"çok hızlı ve patlayıcı bir şekilde\" artmasının temel mekanizması nedir?", o: ["A) Kış uykusuna yatabilmesi", "B) Canlı doğurarak (vivipar) çoğalması sayesinde bekleme süresi olmadan hızla tamamlanması", "C) İdeal sıcaklık dışındaki balıklara saldırması", "D) Kana karışması"], c: 1, e: "B - Canlı doğuran (vivipar) yapısı, yumurta bekleme evresini atladığı için hızlı artışa neden olur."},
        {q: "SORU-60: Ektoparaziter istilalarda asıl yüksek ölümlerin görülmesinin nedeni aşağıdakilerden hangisidir?", o: ["A) Antikorları kopyalaması", "B) Parazitin açtığı yaraların fırsatçı bakteriler için giriş kapısı oluşturarak \"sekonder enfeksiyonlara\" zemin hazırlaması", "C) Mukus üretimini durdurması", "D) Stres hormonu salgılatması"], c: 1, e: "B - Ektoparazitlerin asıl ölümcül etkisi, diğer fırsatçı bakterilerin içeri girmesine ve 'sekonder (ikincil) enfeksiyonlara' yol açmasıdır."},
        {q: "SORU-61: Patojenin kan dolaşımına karışarak tüm iç organlarda kanamalara neden olduğu sistemik zehirlenme tablosuna ne ad verilir?", o: ["A) Hemorajik Septisemi", "B) Nefrokalsinozis", "C) Methemoglobinemi", "D) Respiratorik Asidoz"], c: 0, e: "A - Bakterilerin kan dolaşımına geçip iç organlarda kanamalı yıkım yarattığı tabloya 'Hemorajik Septisemi' denilmiştir."},
        {q: "SORU-62: Bakteriyel patojenleri eşleştiriniz.\nI. Aeromonas salmonicida a) Saddleback (Eyer) lezyonu.\nII. Yersinia ruckeri b) Furunculosis (Çıban) hastalığı.\nIII. Flavobacterium columnare c) Kızıl Ağız (ERM) hastalığı.", o: ["A) I-b, II-c, III-a", "B) I-a, II-b, III-c", "C) I-c, II-b, III-a", "D) I-b, II-a, III-c"], c: 0, e: "A - Aeromonas (b) Furunculosis, Yersinia (c) Kızıl Ağız (ERM), Flavobacterium (a) Saddleback lezyonu yapar."},
        {q: "SORU-63: Tatlı su balıklarında özellikle sırt yüzgeci etrafında karakteristik \"eyer şeklinde (saddleback)\" lezyonlar oluşturan patojen hangisidir?", o: ["A) Vibrio anguillarum", "B) Gyrodactylus", "C) Streptococcus iniae", "D) Flavobacterium columnare"], c: 3, e: "D - Sırt yüzgecinde karakteristik beyaz-sarımtırak eyer lezyonu oluşturan patojen Flavobacterium columnare'dir."},
        {q: "SORU-64: \"Tuzlu su (deniz) yetiştiriciliğinde\" en yaygın görülen hemorajik septisemi etkeni olan bakteri hangisidir?", o: ["A) Yersinia ruckeri", "B) Vibrio anguillarum", "C) Ichthyophthirius multifiliis", "D) Aeromonas salmonicida"], c: 1, e: "B - Tuzlu su (deniz) sistemlerindeki en yaygın ve yıkıcı Gram-negatif bakteri Vibrio anguillarum'dur."},
        {q: "SORU-65: Streptococcus iniae enfeksiyonunun diğerlerinden farklı olarak balıktaki temel etki mekanizması aşağıdakilerden hangisidir?", o: ["A) Kahverengi kan oluşturması", "B) İskemik şoka neden olması", "C) Doğrudan merkezi sinir sistemine yerleşerek menenjit, dönme hareketi ve nörolojik bozukluklar yapması", "D) Oksijen alımını durdurması"], c: 2, e: "C - Gram-pozitif Streptococcus iniae, sinir sistemini hedef alarak menenjit ve nörolojik bozukluklar yapar."},
        {q: "SORU-66: Osmoregülatör organların iflas etmesi sonucu balığın karın boşluğunda aşırı sıvı birikmesi tablosu klinik olarak nasıl adlandırılır?", o: ["A) Asit", "B) Ekzoftalmus", "C) Hiperkapni", "D) Lenfopeni"], c: 0, e: "A - İç organların iflasıyla karın boşluğunda sıvı birikmesi tablosuna klinik olarak 'Asit' adı verilmektedir."},
        {q: "SORU-67: Bir Gyrodactylus salgınının hemen ardından Aeromonas enfeksiyonunun patlak vermesinin temel nedeni nedir?", o: ["A) Parazitlerin açtığı yaraların serbest yaşayan bakteriler için \"giriş kapısı\" oluşturması", "B) Zorunlu olarak Dactylogyrus yumurtalarına ihtiyaç duyması", "C) Amonyak zehirlenmesi başlatması", "D) Antikor üretimini artırması"], c: 0, e: "A - Parazitlerin açtığı fiziksel yaralar, sudaki fırsatçı bakterilerin kana karışmasına giriş kapısı sağlar."},
        {q: "SORU-68: Yersinia ruckeri'nin neden olduğu hastalığa \"Enteric Redmouth (ERM)\" isminin verilmesinin nedeni nedir?", o: ["A) Ekzoftalmus yapması", "B) Kırmızı çıbanlar açması", "C) Hastalığın en belirgin işaretinin ağız, çene çevresindeki şiddetli hemorajik kanamalar (kızıl ağız) olması", "D) Mukusu kırmızıya boyaması"], c: 2, e: "C - ERM hastalığı adını, tipik bir bulgu olan 'ağız ve çene çevresindeki kanamalardan (kızıl ağız)' alır."},
        {q: "SORU-69: Klinik bulguları eşleştiriniz.\nI. Furunculosis a) Gözün dışarı fırlaması.\nII. Ekzoftalmus b) İç organlarda kanamalı yıkım tablosu.\nIII. Hemorajik Septisemi c) Kas dokusunda erime ve çıbanlar.", o: ["A) I-c, II-a, III-b", "B) I-a, II-b, III-c", "C) I-b, II-c, III-a", "D) I-c, II-b, III-a"], c: 0, e: "A - Furunculosis (c) çıbandır. Ekzoftalmus (a) gözün fırlamasıdır. Hemorajik septisemi (b) kanamalı yıkımdır."},
        {q: "SORU-70: Bilinçsiz antibiyotik kullanımı hastalık yönetimini çökertir. Bu durumun farmakolojik sonucu nedir?", o: ["A) BOİ'nin sıfırlanması", "B) Bakterilerin genetik mutasyonla \"dirençli suşlar\" geliştirmesi ve tedavilerin etkisiz kalması", "C) Amonyağın oksitlenmesi", "D) Savunma mekanizmasının güçlenmesi"], c: 1, e: "B - Bilinçsiz kullanım, bakterilerin 'dirençli suşlar' geliştirmesine yol açar ve tedavileri etkisiz kılar."},
        {q: "SORU-71: Virüslerin hücresel bir yapıya sahip olmadıkları ve balığın kendi hücre mekanizmasını ele geçirdikleri yaşam formunu tanımlayan kavram nedir?", o: ["A) Fakültatif patojen", "B) Obligat hücre içi patojen", "C) Monogenean trematod", "D) Serbest yüzen tomit"], c: 1, e: "B - Virüslerin çoğalamayıp hücre mekanizmasını ele geçirmeleri durumu 'obligat hücre içi patojen' olarak tanımlanır."},
        {q: "SORU-72: Yavru balıklarda pankreası yıkan ve \"spiral çizerek yüzmelerine\" neden olan viral etken hangisidir?", o: ["A) Saprolegnia spp.", "B) İnfeksiyöz Pankreatik Nekroz (IPN)", "C) Viral Hemorajik Septisemi (VHS)", "D) Streptococcus iniae"], c: 1, e: "B - Yavru balıklarda görülen ve 'spiral yüzme' tablosuna neden olan viral etken İnfeksiyöz Pankreatik Nekroz'dur (IPN)."},
        {q: "SORU-73: Viral bir salgında (örneğin VHS), antibiyotik uygulanmasının hastalığın seyrini iyileştirmemesinin temel farmakolojik nedeni nedir?", o: ["A) Virüslerin antibiyotiği yapılarına katması", "B) Antibiyotiklerin hücre dışındaki bakterileri hedef alması, virüslerin ise \"hücre içi\" yapılar olması", "C) Oksijeni tüketmesi", "D) Alkalinitesini düşürmesi"], c: 1, e: "B - Virüsler 'hücre içi' obligat patojenler olduğu için, hücre dışını hedef alan antibiyotikler viral salgınlarda işe yaramaz."},
        {q: "SORU-74: Patojenleri klinik bulgularıyla eşleştiriniz.\nI. Saprolegnia spp. a) Spiral yüzme hareketi yaptıran viral hastalık.\nII. İnfeksiyöz Pankreatik Nekroz b) İç organlarda şiddetli kanamalı yıkım yaratan virüs.\nIII. Viral Hemorajik Septisemi c) Pamukçuk lezyonları oluşturan fungal hastalık.", o: ["A) I-c, II-a, III-b", "B) I-a, II-b, III-c", "C) I-b, II-c, III-a", "D) I-c, II-b, III-a"], c: 0, e: "A - Saprolegnia (c) fungal pamukçuktur. IPN (a) spiral yüzme yaptırır. VHS (b) kanamalı virüstür."},
        {q: "SORU-75: Fungal hastalıkların (mantarların) kültür ortamlarında ortaya çıkmasını tetikleyen temel çevresel mekanizma nedir?", o: ["A) Virüslerin mutasyon geçirmesi", "B) Hiperkapni ortamlarında hayatta kalabilmesi", "C) Fiziksel travmaların koruyucu mukus bariyerini yıkarak mantara giriş kapısı (sekonder istila) açması", "D) pH'ın aniden yükselmesi"], c: 2, e: "C - Fungal hastalıklar fırsatçı (sekonder) patojenlerdir; mukus bariyeri yıkıldığında dokuya yerleşebilirler."},
        {q: "SORU-76: Saprolegnia spp. enfeksiyonunda mantarın balığı ölüme götüren asıl patofizyolojik silahı nedir?", o: ["A) \"Hif\" adı verilen ipliksi uzantılarının dokuya girip delikler açarak balığın \"osmoregülatör çöküş\" yaşamasına neden olması", "B) Amonyak sentezini durdurması", "C) Demiri yükseltgemesi", "D) Ekzoftalmus tablosunu yaratması"], c: 0, e: "A - Mantarın asıl ölümcül etkisi, 'Hif' adlı ipliksi yapılarının dokuya girip balıkta osmoregülatör çöküş yaratmasıdır."},
        {q: "SORU-77: Mantar tedavisinde eskiden kullanılan \"Malahit Yeşili\" adlı kimyasalın yasaklanmasının nedeni nedir?", o: ["A) Oksijen taşıma kapasitesini sıfırlaması", "B) Karsinojenik (kanser yapıcı) etkilere sahip olmasının tespit edilmesi", "C) Dirençli suşlar yaratması", "D) Kromatoforları tahrip etmesi"], c: 1, e: "B - Malahit Yeşilinin yasaklanma nedeni metinde açıkça 'karsinojenik (kanser yapıcı) etkilere sahip olması' olarak belirtilmiştir."},
        {q: "SORU-78: Hastalıklar ortaya çıkmadan önceki süreçlere odaklanan yönetimsel \"koruyucu hekimlik\" stratejisinin genel adı nedir?", o: ["A) Profilaksi (Aşılama ve Biyogüvenlik)", "B) Dilüsyon etkisi", "C) Taşıma kapasitesinin artırılması", "D) Henry Yasası"], c: 0, e: "A - Hastalık gelmeden önce alınan aşı ve biyogüvenlik gibi koruyucu hekimlik uygulamalarına 'Profilaksi' denilmektedir."},
        {q: "SORU-79: Terimleri tanımlarıyla eşleştiriniz.\nI. Hif a) Biyogüvenlik önlemleri.\nII. Profilaksi b) Mantarların dokuya nüfuz eden kök benzeri uzantıları.\nIII. Obligat hücre içi patojen c) Konakçı hücresine girmek zorunda olan ajan.", o: ["A) I-b, II-a, III-c", "B) I-a, II-c, III-b", "C) I-c, II-b, III-a", "D) I-b, II-c, III-a"], c: 0, e: "A - Hif (b) mantarın yapısıdır. Profilaksi (a) koruyucu hekimliktir. Obligat hücre içi patojen (c) virüslerin yaşam tarzıdır."},
        {q: "SORU-80: İnfeksiyöz Pankreatik Nekroz (IPN) ve Saprolegnia spp. arasındaki belirgin patolojik fark hangisidir?", o: ["A) IPN sekonder fırsatçı, Saprolegnia obligat hücre içi patojendir.", "B) IPN kimyasallarla, Saprolegnia aşı ile tedavi edilir.", "C) IPN hücre içine yerleşen birincil bir viral etken iken; Saprolegnia deri tahribatıyla dokuyu saran sekonder fungal etkendir.", "D) Her ikisi de bakteriyeldir."], c: 2, e: "C - IPN birincil viral bir hastalıktır. Saprolegnia ise deri tahribatını bekleyen sekonder fungal bir hastalıktır."},
        {q: "SORU-81: Su ürünleri sistemlerinde enfeksiyonun aynı nesil içinde bireyden bireye, su veya ekipmanlar aracılığıyla yayılmasına ne ad verilmektedir?", o: ["A) Vertikal Bulaşma", "B) İntra-ovum Bulaşma", "C) Horizontal Bulaşma", "D) Konjenital Bulaşma"], c: 2, e: "C - Metinde enfeksiyonun aynı nesil içinde bireyden bireye, su veya ekipmanlar aracılığıyla yayılmasına 'Horizontal Bulaşma' adı verilmektedir."},
        {q: "SORU-82: Vertikal bulaşmanın kontrol edilmesinin (engellenmesinin) \"çok zor olmasının\" temel fizyolojik nedeni aşağıdakilerden hangisidir?", o: ["A) Sadece solungaçlardan giriş yapabilmesi", "B) Patojenlerin döllenme öncesi/sırasında yumurtanın içine (intra-ovum) yerleşebilmesi ve iyot gibi yüzey dezenfektanlarının ulaşamaması", "C) Suyun vektör görevi görmesi", "D) Ergin balıkların bağışıklığının zayıf olması"], c: 1, e: "B - Vertikal bulaşmanın kontrolü zordur çünkü patojen yumurta içine (intra-ovum) yerleştiğinden dış yüzey dezenfektanları patojene etki edemez."},
        {q: "SORU-83: Patojen giriş kapılarını eşleştiriniz.\nI. Gastrointestinal Yol a) Tek katlı epitel yapısı ve zengin kılcal ağıyla ideal bir giriş noktasıdır.\nII. Solungaçlar b) Fırsatçı sekonder enfeksiyonların girişini hızlandıran, bütünlüğün bozulmasıyla açılan kapıdır.\nIII. Deri ve Mukoza c) Fekal-oral yolla tüketilmesiyle enfeksiyonu başlatan kapıdır.", o: ["A) I-c, II-a, III-b", "B) I-a, II-b, III-c", "C) I-b, II-c, III-a", "D) I-c, II-b, III-a"], c: 0, e: "A - Gastrointestinal Yol (c) fekal-oral yolla enfeksiyonu başlatır. Solungaçlar (a) tek katlı epitel ile kapıdır. Deri ve Mukoza (b) sekonder enfeksiyonlara kapı açar."},
        {q: "SORU-84: Mide asidine dirençli olan patojenlerin epitele tutunarak kana karıştığı ve hem lokal hem genel hastalıklara yol açtığı giriş kapısı hangisidir?", o: ["A) Deri ve Pullar", "B) Gözler", "C) Solungaçlar", "D) Sindirim Sistemi"], c: 3, e: "D - Mide asidine dirençli etkenlerin epitele tutunarak girdiği açıklık 'Sindirim Sistemi (Gastrointestinal Yol)' olarak belirtilmiştir."},
        {q: "SORU-85: IPN'in epidemiyolojik olarak kontrolünü zorlaştıran özellik aşağıdakilerden hangisidir?", o: ["A) Sadece horizontal yayılması", "B) Hem vertikal hem horizontal bulaşabilmesi, ergin bireylerde hastalık yapmayıp \"taşıyıcılık (portörlük)\" yaratması", "C) Sadece solungaçlardan girebilmesi", "D) İyotla yok edilebilmesi"], c: 1, e: "B - IPN'in mücadelesini zorlaştıran şey hem vertikal hem horizontal bulaşması ve ergin bireylerde 'taşıyıcılık' (portörlük) yaratmasıdır."},
        {q: "SORU-86: Pastörellozis hastalığının yarattığı yıkıcı ekonomik etkinin temel epidemiyolojik sebebi nedir?", o: ["A) Sadece yavru döneminde görülmesi", "B) Sadece vertikal yolla bulaşması", "C) \"Ergin\" balıklarda duyarlılığın yüksek olması ve hasat boyuna gelmiş maliyetli balıkların kaybedilmesi", "D) Mantar kökenli olması"], c: 2, e: "C - Pastörellozis hastalığında 'Ergin' balıkların duyarlılığı yüksektir, bu da hasat boyuna gelen balıkların kaybı anlamına geldiğinden ekonomik etkisi büyüktür."},
        {q: "SORU-87: Hastalıkları ve konakçı duyarlılığı gösterdikleri kritik evreleri eşleştiriniz.\nI. Saprolegniazis a) \"Yavru\" döneminde duyarlılık çok yüksektir.\nII. Soğuk Su Hastalığı b) \"Yumurta\" döneminde duyarlılık çok yüksektir.\nIII. Pastörellozis c) \"Ergin\" (hasat boyu) döneminde duyarlılık yüksektir.", o: ["A) I-b, II-a, III-c", "B) I-a, II-b, III-c", "C) I-c, II-a, III-b", "D) I-b, II-c, III-a"], c: 0, e: "A - Saprolegniazis (b) yumurta döneminde etkilidir. Soğuk Su Hastalığı (a) yavrularda görülür. Pastörellozis (c) erginlerde görülür."},
        {q: "SORU-88: Deride lezyonlar oluştuğunda sistemde fırsatçı olarak bekleyen patojenlerin başlattığı hastalık tablosuna ne ad verilir?", o: ["A) Konjenital Enfeksiyon", "B) Sekonder (İkincil) Enfeksiyon", "C) Vertikal Transmisyon", "D) Fekal-Oral Enfeksiyon"], c: 1, e: "B - Deri bütünlüğünün bozulması sonucu fırsatçı mantar ve bakterilerin giriş yapmasına 'sekonder enfeksiyonlar' denilmektedir."},
        {q: "SORU-89: Hem vertikal hem horizontal bulaşan ve yavrularda yüksek ölüm yapan \"Enterik Kızılağız\" hastalığının kısaltması nedir?", o: ["A) IPN", "B) SPF", "C) ERM", "D) Vibriozis"], c: 2, e: "C - Enterik Kızılağız hastalığının kısaltması metinde 'ERM (Yersinia ruckeri)' olarak verilmiştir."},
        {q: "SORU-90: Yavrularda tedavi edilmediğinde yatay yolla hızla yayılarak %100'e varan ölüm yapan paraziter hastalık hangisidir?", o: ["A) Beyaz Benek Hastalığı", "B) Furunculosis", "C) Saprolegniazis", "D) Pseudo-Böbrek Hastalığı"], c: 0, e: "A - Yavrularda %100'e varan ölüm yapabilen paraziter etken 'Beyaz Benek Hastalığı'dır."},
        {q: "SORU-91: İşletmeye alınan asemptomatik balıklara karantina uygulanmasının temel nedeni nedir?", o: ["A) Taşıma kapasitesini aşmayı engellemek", "B) Taşıyıcı (portör) olma ihtimaline karşı, kuluçka süresini gözlemleyerek yayılma riskini elimine etmek", "C) Enzimleri nötralize etmek", "D) Genetik iyileştirme yapmak"], c: 1, e: "B - Dışarıdan gelen asemptomatik balıklar 'portör' olabilir. Karantina, kuluçka süresini gözlemlemek için uygulanır."},
        {q: "SORU-92: Ultraviyole (UV-C) filtrasyon sisteminin etkinliğini düşüren ve patojenlere \"gölge\" yapan su problemi nedir?", o: ["A) Suyun askıda katı madde (tortu) içermesi", "B) Yüksek sodyum hipoklorit içermesi", "C) Asidik duruma gelmesi", "D) Oksijen gazının aşırı doygunluğu"], c: 0, e: "A - UV-C filtrasyon sisteminde suda bulunan 'askıda katı maddelerin (tortu)' patojenlere gölge yapması etkinliği kısıtlar."},
        {q: "SORU-93: Dezenfektan maddelerini kullanım alanlarıyla eşleştiriniz.\nI. İyodoforlar a) Deniz balıklarında bit mücadelesinde kullanılan bileşik.\nII. Formol b) Yumurtaların dezenfeksiyonunda kullanılan bileşik.\nIII. Hidrojen Peroksit c) Ektoparazitlere ve mantarlara karşı kullanılan bileşik.", o: ["A) I-b, II-c, III-a", "B) I-a, II-b, III-c", "C) I-c, II-b, III-a", "D) I-b, II-a, III-c"], c: 0, e: "A - İyodoforlar (b) yumurtada, Formol (c) ektoparazit ve mantarda, Hidrojen peroksit (a) deniz balıklarında kullanılır."},
        {q: "SORU-94: Metne göre dezenfeksiyon uygulamasının amacı aşağıdakilerden hangisidir?", o: ["A) Sadece horizontal bulaşmayı durdurmak", "B) Etken sayısını enfektif (hastalık yapıcı) dozun altına düşürerek hastalık oluşturma baskısını zayıflatmak", "C) Lizozim enzimlerini sıfırlamak", "D) DNA'dan silmek"], c: 1, e: "B - Dezenfeksiyon ile etken sayısı 'enfektif dozun' altına düşürülerek hastalık oluşturma baskıları zayıflatılır."},
        {q: "SORU-95: Körlüğe neden olan göz parazitlerinin (Diplostomum spp.) zorunlu ara konakçısı olan vektör canlılar hangisidir?", o: ["A) Yabani karnivor balıklar", "B) Makrofajlar", "C) Balıkçıl kuşlar ve salyangozlar", "D) Zooplanktonlar"], c: 2, e: "C - Diplostomum spp. göz parazitlerinin taşıyıcısının 'balıkçıl kuşlar ve salyangozlar' olduğu belirtilmiştir."},
        {q: "SORU-96: Aşılamanın sağladığı ekonomik ve ekolojik yararlar arasında hangisi gösterilemez?", o: ["A) Mortalite ve tedavi maliyetlerinin azalması", "B) İlaç kalıntısı sorununun azalması", "C) FCR iyileşmesi", "D) İmmünosupresyona neden olarak hastalıkları maskelemesi"], c: 3, e: "D - İmmünosupresyon ve hastalık maskeleme aşının değil, 'yetersiz beslenmenin' sonucudur."},
        {q: "SORU-97: Enjeksiyon yönteminin her boydaki balığa her an uygulanamamasının nedeni nedir?", o: ["A) Aşının mide asidinde bozulması", "B) Stres yaratması, anestezi gerektirmesi ve balığın fiziksel olarak en az 15-20 gram üzerinde olmasını zorunlu kılması", "C) Vertikal hastalıklarda etkili olması", "D) Adjuvanların hepatoma yaratması"], c: 1, e: "B - Enjeksiyon işlemi stres yaratır, anestezi gerektirir ve balığın en az 15-20 gram ağırlıkta olmasını zorunlu kılar."},
        {q: "SORU-98: İmmersiyon (Daldırma) yönteminde, antijenler balığın içine nasıl nüfuz eder?", o: ["A) Sindirim sistemi / Makrofajlar", "B) Yüzgeç / Kromatoforlar", "C) Gözler / Lenfositler", "D) Solungaç ve deri / \"Antijen Alımı (Uptake)\" hücreleri"], c: 3, e: "D - İmmersiyonda antijenler solungaç ve deri yoluyla girer ve 'Antijen Alımı (Uptake)' hücreleri devreye girer."},
        {q: "SORU-99: Oral (yemle) aşılamada aşı yapısının bozulması riskinin fizyolojik nedeni nedir?", o: ["A) Midedeki asidik ortam ve pepsin, tripsin gibi sindirim enzimlerinin aşının antijen proteinlerini bozması", "B) Uptake hücrelerinin zedelenmesi", "C) Aflatoksin tepkimesi", "D) Dilüsyon (seyreltme) etkisi"], c: 0, e: "A - Oral aşılamanın dezavantajı, midenin asidik yapısının ve sindirim enzimlerinin (pepsin, tripsin) aşıyı bozmasıdır."},
        {q: "SORU-100: Aşılama yöntemlerini karakteristik uygulama pratikleriyle eşleştiriniz.\nI. Enjeksiyon Yöntemi a) \"Booster (pekiştirme)\" aşısı olarak tercih edilen yöntem.\nII. İmmersiyon Yöntemi b) Balığın suya bırakıldığı ve solungaç/deri yoluyla emildiği yöntem.\nIII. Oral Yöntem c) Adjuvanlarla bağışıklık süresinin uzun tutulduğu, karın boşluğuna uygulanan yöntem.", o: ["A) I-c, II-a, III-b", "B) I-a, II-b, III-c", "C) I-b, II-c, III-a", "D) I-c, II-b, III-a"], c: 3, e: "D - Enjeksiyon (c) karın boşluğuna, İmmersiyon (b) daldırmayla, Oral (a) ise Booster (pekiştirme) için kullanılır."}
    ];

    let currentQuestions = [...quizData];
    let currentIndex = 0;
    let solvedIndex = -1; 
    let userAnswers = {}; 

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const statusText = document.getElementById('statusText');
    const remainingCountEl = document.getElementById('remainingCount');
    const explanationEl = document.getElementById('explanation');
    const reaskBadge = document.getElementById('reaskBadge');

    function loadQuestion() {
        const q = currentQuestions[currentIndex];
        
        // Tekrar sorulan soruysa uyarı rozetini göster
        reaskBadge.style.display = q.isReasked ? 'inline-block' : 'none';

        const splitIndex = q.q.indexOf(':');
        if (splitIndex !== -1) {
            const questionNumber = q.q.substring(0, splitIndex + 1); 
            const questionText = q.q.substring(splitIndex + 1);      
            questionEl.innerHTML = `${questionNumber} <br><span class="lesson-name">(${lessonTitle})</span><br> ${questionText}`;
        } else {
            questionEl.textContent = q.q;
        }

        optionsEl.innerHTML = '';
        explanationEl.style.display = 'none';
        
        updateStatusCounters();

        q.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            
            // Eğer soru daha önce (bu indexte) çözüldüyse durumu ekrana geri yükle
            if (currentIndex <= solvedIndex) {
                btn.disabled = true;
                let answered = userAnswers[currentIndex];
                
                // İşaretlediği şıkkı renklendir
                if (index === answered) {
                    if (answered === q.c) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                    }
                }

                // Çözümü Gösterme Mantığı
                let showSolution = (answered === q.c) || (q.isReasked && answered !== q.c);

                if (showSolution) {
                    if (index === q.c) {
                        btn.classList.add('correct');
                    }
                    explanationEl.innerHTML = `<strong>Çözüm:</strong> ${q.e}`;
                    explanationEl.style.display = 'block';
                }

            } else {
                btn.onclick = () => selectOption(index);
            }
            optionsEl.appendChild(btn);
        });

        updateNavButtons();
    }

    function selectOption(selectedIndex) {
        const q = currentQuestions[currentIndex];
        userAnswers[currentIndex] = selectedIndex;
        solvedIndex = Math.max(solvedIndex, currentIndex);

        const buttons = optionsEl.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        let isCorrect = (selectedIndex === q.c);

        if (isCorrect) {
            // DOĞRU CEVAP
            buttons[selectedIndex].classList.add('correct');
            explanationEl.innerHTML = `<strong>Çözüm:</strong> ${q.e}`;
            explanationEl.style.display = 'block';
        } else {
            // YANLIŞ CEVAP
            buttons[selectedIndex].classList.add('wrong');
            
            if (!q.isReasked) {
                // İlk defa yanlış yaptı: Çözümü gizle, soruyu 5 adım sonraya (veya en sona) kopyala
                explanationEl.style.display = 'none';
                
                let insertIndex = currentIndex + 6;
                if (insertIndex > currentQuestions.length) {
                    insertIndex = currentQuestions.length;
                }
                
                // Soruyu "isReasked: true" etiketiyle listeye dahil et
                currentQuestions.splice(insertIndex, 0, { ...q, isReasked: true });
                
            } else {
                // Tekrar sorulan soruyu YİNE yanlış yaptı: Doğruyu ve çözümü göster
                buttons[q.c].classList.add('correct');
                explanationEl.innerHTML = `<strong>Çözüm:</strong> ${q.e}`;
                explanationEl.style.display = 'block';
            }
        }
        
        updateStatusCounters();
        updateNavButtons();
    }

    function updateStatusCounters() {
        statusText.textContent = `Soru: ${currentIndex + 1} / ${currentQuestions.length}`;
        let remaining = currentQuestions.length - (currentIndex + 1);
        remainingCountEl.textContent = `Kalan Soru: ${remaining}`;
    }

    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);

        if (currentIndex <= solvedIndex) {
            nextBtn.style.visibility = 'visible';
            if(currentIndex === currentQuestions.length - 1) {
                nextBtn.textContent = "Sınavı Bitir";
            } else {
                nextBtn.textContent = "Sonraki ❯";
            }
        } else {
            nextBtn.style.visibility = 'hidden';
        }
    }

    function goForward() {
        if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            loadQuestion();
        } else {
            alert("Tebrikler! 100 soruluk devasa Tier-0 Eğitim setini ve tekrarlarını başarıyla tamamladınız.");
            location.reload();
        }
    }

    function goBack() {
        if (currentIndex > 0) {
            currentIndex--;
            loadQuestion();
        }
    }

    loadQuestion();
</script>
